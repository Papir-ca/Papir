<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment Successful | Papir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Your existing CSS – keep exactly as before */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .success-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .success-icon {
            font-size: 80px;
            color: #06D6A0;
            margin-bottom: 30px;
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #06D6A0, #118AB2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #a0aec0; font-size: 1.2rem; margin-bottom: 30px; line-height: 1.6; }
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #06D6A0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: #06D6A0;
            width: 0%;
            animation: progress 2s ease infinite;
        }
        @keyframes progress {
            0% { width: 0%; opacity: 1; }
            50% { width: 70%; opacity: 1; }
            100% { width: 100%; opacity: 0; }
        }
        .details {
            background: rgba(6, 214, 160, 0.1);
            border: 1px solid rgba(6, 214, 160, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .detail-row:last-child { 
            margin-bottom: 0; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 10px; 
            margin-top: 10px; 
            font-weight: bold; 
            color: #06D6A0; 
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(to right, #06D6A0, #118AB2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(6, 214, 160, 0.3); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
        .error-box {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #FF6B6B;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .hidden { display: none; }
        .share-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .share-label { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        .share-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .share-input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* Mobile responsive additions */
        @media (max-width: 768px) {
            .success-container {
                padding: 20px;
                min-height: 100vh;
                justify-content: center;
            }
            .success-container {
                padding: 20px;
                border-radius: 16px;
            }
            .success-icon {
                font-size: 4rem;
                margin-bottom: 15px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .details {
                padding: 15px;
                margin: 20px 0;
            }
            .btn {
                padding: 14px 20px;
                width: 100%;
                margin: 8px 0;
            }
            .share-input {
                font-size: 0.8rem;
            }
        }

        /* Universal helpers */
        * { -webkit-tap-highlight-color: transparent; }
        body { -webkit-text-size-adjust: 100%; overflow-x: hidden; max-width: 100vw; }
        input, select, textarea, button { font-size: 16px; min-height: 44px; }
    </style>
</head>
<body>

<div class="success-container">
    <!-- Loading State -->
    <div id="loadingState">
        <div class="success-icon"><i class="fas fa-spinner fa-spin"></i></div>
        <h1 id="loadingText">Processing...</h1>
        <p class="subtitle">Please wait while we set up your cards.</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    
    <!-- Success State -->
    <div id="successState" class="hidden">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1>Payment Successful!</h1>
        <p class="subtitle" id="successSubtitle">Your cards are ready.</p>
        
        <div class="details" id="orderDetails">
            <div class="detail-row">
                <span>Template:</span>
                <span id="templateName">-</span>
            </div>
            <div class="detail-row">
                <span>Quantity:</span>
                <span id="cardQuantity">-</span>
            </div>
            <div class="detail-row" id="batchIdRow" style="display: none;">
                <span>Batch ID:</span>
                <span id="batchIdDisplay">-</span>
            </div>
            <div class="detail-row" id="cardIdRow" style="display: none;">
                <span>Card ID:</span>
                <span id="cardIdDisplay">-</span>
            </div>
            <div class="detail-row">
                <span>Status:</span>
                <span style="color: #06D6A0;">Active</span>
            </div>
        </div>
        
        <div style="margin-top: 30px;">
            <a href="#" id="actionBtn" class="btn btn-primary">
                <i class="fas fa-eye"></i> View Cards
            </a>
            <a href="customize.html" class="btn btn-secondary">
                <i class="fas fa-plus"></i> Create Another
            </a>
        </div>
        
        <!-- Share Link Section (for single cards) -->
        <div class="share-section" id="shareSection" style="display: none;">
            <p class="share-label">Share this link with your recipient:</p>
            <div class="share-container">
                <input type="text" id="shareUrl" class="share-input" readonly>
                <button id="copyBtn" class="btn btn-secondary" style="margin: 0;">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>
    
    <!-- Error State -->
    <div id="errorState" class="hidden">
        <div class="error-box">
            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <h3>Activation Failed</h3>
            <p id="errorMessage" style="margin-top: 10px;">Something went wrong.</p>
        </div>
        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 20px;">
            <i class="fas fa-redo"></i> Try Again
        </button>
        <a href="mailto:support@papir.ca" class="btn btn-secondary" style="margin-top: 10px;">
            <i class="fas fa-envelope"></i> Contact Support
        </a>
    </div>
</div>

<script>
    const BACKEND_URL = window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    
    // Check which flow we're handling
    const sessionId = urlParams.get('session_id');  // Stripe Checkout
    const cardId = urlParams.get('card_id');        // Single card
    const batchId = urlParams.get('batch_id');      // Batch
    const qty = parseInt(urlParams.get('qty')) || 1;
    
    async function handlePaymentSuccess() {
        try {
            if (sessionId) {
                // Check if we have pending card/batch from customize.html
                const pendingCardId = localStorage.getItem('pendingCardId');
                const pendingBatchId = localStorage.getItem('pendingBatchId');
                const pendingQty = parseInt(localStorage.getItem('pendingQty')) || 1;
                
                if (pendingCardId || pendingBatchId) {
                    // Use direct activation (old flow) for customize.html cards
                    document.getElementById('loadingText').textContent = 'Activating your cards...';
                    await handleDirectActivation(pendingCardId || null, pendingBatchId || null, pendingQty);
                    localStorage.removeItem('pendingCardId');
                    localStorage.removeItem('pendingBatchId');
                    localStorage.removeItem('pendingQty');
                } else {
                    // Use Stripe session flow for maker.html
                    document.getElementById('loadingText').textContent = 'Activating your design...';
                    await handleStripeSession(sessionId);
                }
            } else if (cardId || batchId) {
                document.getElementById('loadingText').textContent = 'Activating your cards...';
                await handleDirectActivation(cardId, batchId, qty);
            } else {
                throw new Error('No session, card, or batch ID found in URL');
            }
        } catch (error) {
            console.error('Activation error:', error);
            showError(error.message);
        }
    }
    
    async function handleStripeSession(sessionId) {
        const pendingOrder = JSON.parse(localStorage.getItem('pendingOrder') || '{}');
        
        // Fetch session details to get payment_intent_id
        const sessionRes = await fetch(`${BACKEND_URL}/api/get-session?session_id=${sessionId}`);
        const sessionData = await sessionRes.json();
        const paymentIntentId = sessionData.payment_intent_id;
        const customerEmail = sessionData.customer_email || '';
        
        const response = await fetch(`${BACKEND_URL}/api/activate-after-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                payment_intent_id: paymentIntentId,
                customer_email: customerEmail,
                design_data: pendingOrder
            })
        });
        
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Activation failed');
        
        localStorage.removeItem('pendingOrder');
        localStorage.removeItem('papirDesignAutosave');
        
        showSuccessState({
            isBatch: result.is_batch,
            batchId: result.batch_id,
            cardId: result.card_id,
            quantity: result.cards_created || 1,
            templateName: pendingOrder.template?.name || 'Custom Design'
        });
    }
    
    async function handleDirectActivation(cardId, batchId, qty) {
        const response = await fetch(`${BACKEND_URL}/api/activate-after-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                card_id: cardId,
                batch_id: batchId,
                terms_accepted: true
            })
        });
        
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Activation failed');
        
        showSuccessState({
            isBatch: !!batchId,
            batchId: batchId,
            cardId: cardId,
            quantity: qty,
            templateName: 'Custom Card'
        });
    }
    
    function showSuccessState(data) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        
        document.getElementById('templateName').textContent = data.templateName;
        document.getElementById('cardQuantity').textContent = data.quantity;
        
        if (data.isBatch && data.batchId) {
            document.getElementById('batchIdRow').style.display = 'flex';
            document.getElementById('batchIdDisplay').textContent = data.batchId;
            document.getElementById('actionBtn').href = `batch-manager.html?batch=${encodeURIComponent(data.batchId)}`;
            document.getElementById('actionBtn').innerHTML = '<i class="fas fa-layer-group"></i> Manage Batch';
            document.getElementById('successSubtitle').textContent = `Your batch of ${data.quantity} cards is ready.`;
        } else if (data.cardId) {
            document.getElementById('cardIdRow').style.display = 'flex';
            document.getElementById('cardIdDisplay').textContent = data.cardId;
            document.getElementById('actionBtn').href = `viewer.html?card=${data.cardId}`;
            document.getElementById('actionBtn').innerHTML = '<i class="fas fa-eye"></i> View Card';
            document.getElementById('successSubtitle').textContent = 'Your card is ready to send.';
            document.getElementById('shareSection').style.display = 'block';
            document.getElementById('shareUrl').value = `${BACKEND_URL}/viewer.html?card=${data.cardId}`;
        }
    }
    
    function showError(message) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorMessage').textContent = message;
    }
    
    document.getElementById('copyBtn')?.addEventListener('click', async function() {
        const input = document.getElementById('shareUrl');
        try {
            await navigator.clipboard.writeText(input.value);
            this.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
                this.innerHTML = '<i class="fas fa-copy"></i> Copy';
            }, 2000);
        } catch (err) {
            input.select();
            document.execCommand('copy');
        }
    });
    
    handlePaymentSuccess();
</script>
<!-- Universal mobile helpers -->
<script>
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, { passive: false });
    function setMobileHeight() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', setMobileHeight);
    window.addEventListener('orientationchange', setMobileHeight);
    setMobileHeight();
    const originalHeight = window.innerHeight;
    window.addEventListener('resize', () => {
        if (window.innerHeight < originalHeight * 0.75) document.body.classList.add('keyboard-open');
        else document.body.classList.remove('keyboard-open');
    });
</script>
</body>
</html>
