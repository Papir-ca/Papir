<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Manager | Papir</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0 40px 0;
            position: relative;
        }
        
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF6B6B, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .search-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .search-title {
            color: #06D6A0;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #06D6A0;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .search-btn {
            background: #06D6A0;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-btn:hover {
            background: #0ef7b9;
            transform: translateY(-2px);
        }
        
        .recent-batches {
            margin-top: 20px;
        }
        
        .recent-title {
            color: #a0aec0;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .recent-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .recent-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .recent-badge:hover {
            background: #06D6A0;
            color: black;
            border-color: #06D6A0;
        }
        
        .batch-header {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .batch-title {
            font-size: 2rem;
            color: #06D6A0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #06D6A0;
        }
        
        .stat-value {
            font-size: 2rem;
            color: #06D6A0;
            font-weight: bold;
        }
        
        .stat-label {
            color: #a0aec0;
            margin-top: 5px;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card-item {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: #06D6A0;
        }
        
        .card-order {
            font-size: 1rem;
            color: #06D6A0;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .card-id {
            font-family: monospace;
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 15px;
            word-break: break-all;
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
        }
        
        .qr-container {
            position: relative;
            margin: 15px 0;
            text-align: center;
        }
        
        .qr-small {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            display: block;
            border: 2px solid white;
            border-radius: 5px;
        }
        
        .qr-actions {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .qr-action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .qr-action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .qr-action-btn.copy {
            background: #06D6A0;
            color: black;
        }
        
        .qr-action-btn.download {
            background: #f39c12;
            color: black;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .action-btn.view-btn {
            background: #BCAE83;
            color: black;
        }
        
        .action-btn.copy-btn {
            background: #06D6A0;
            color: black;
        }
        
        .action-btn.download-btn {
            background: #f39c12;
            color: black;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .status-active {
            background: #2ecc71;
            color: black;
        }
        
        .status-pending {
            background: #f39c12;
            color: black;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #06D6A0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.5s;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .notification.success {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }
        
        .notification.error {
            background: linear-gradient(to right, #FF6B6B, #FF8E53);
        }
        
        .notification.info {
            background: linear-gradient(to right, #36D1DC, #5B86E5);
        }
        
        .add-more-btn {
            background: #f39c12;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        
        .add-more-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            display: none;
        }
        
        .error-message i {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .error-message button {
            background: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .error-message button:hover {
            background: #555;
        }
        
        .no-cards {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px;
            color: #aaa;
            background: #2a2a2a;
            border-radius: 10px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .back-button {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 20px;
                display: inline-block;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <a href="maker.html" class="back-button" id="backBtn">
        <i class="fas fa-arrow-left"></i> Back to Creator
    </a>
    
    <div class="container">
        <header>
            <h1 class="logo">📦 Papir Batch Manager</h1>
            <p class="tagline" id="batchTagline">Search, view, and manage all your card batches</p>
        </header>
        
        <!-- Search Section - NEW -->
        <div class="search-section">
            <div class="search-title">
                <i class="fas fa-search"></i> Find a Batch
            </div>
            
            <div class="search-box">
                <input type="text" id="batchSearchInput" class="search-input" placeholder="Enter Batch ID (e.g., wedding, WEDDING-2024, event123)" value="">
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> Load Batch
                </button>
            </div>
            
            <div class="recent-batches" id="recentBatches" style="display: none;">
                <div class="recent-title">Recent Batches:</div>
                <div class="recent-list" id="recentList"></div>
            </div>
        </div>
        
        <div id="batchInfo" style="display: none;">
            <div class="batch-header">
                <div class="batch-title">
                    <i class="fas fa-layer-group"></i>
                    <span id="batchIdDisplay"></span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="cardsCreated">0</div>
                        <div class="stat-label">Cards in Batch</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeCount">0</div>
                        <div class="stat-label">Active Cards</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalScans">0</div>
                        <div class="stat-label">Total Scans</div>
                    </div>
                </div>
            </div>
            
            <div id="cardsContainer" class="cards-grid">
                <!-- Cards will be loaded here -->
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="#" class="add-more-btn" id="addMoreLink">
                    <i class="fas fa-plus-circle"></i> Add More Cards to This Batch
                </a>
            </div>
        </div>
        
        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            <div>Loading batch information...</div>
        </div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Error Loading Batch</h3>
            <p id="errorText"></p>
            <button id="retryBtn">
                <i class="fas fa-sync-alt"></i> Try Again
            </button>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const BACKEND_URL = 'https://papir.ca';
        
        // Get batch ID from URL and decode it
        const urlParams = new URLSearchParams(window.location.search);
        const encodedBatchId = urlParams.get('batch');
        const urlBatchId = encodedBatchId ? decodeURIComponent(encodedBatchId) : null;
        
        console.log('Initial URL batch:', urlBatchId);
        
        let currentBatch = null;
        let currentCards = [];
        let recentBatches = JSON.parse(localStorage.getItem('recentBatches') || '[]');
        
        const elements = {
            batchSearchInput: document.getElementById('batchSearchInput'),
            searchBtn: document.getElementById('searchBtn'),
            recentBatches: document.getElementById('recentBatches'),
            recentList: document.getElementById('recentList'),
            batchInfo: document.getElementById('batchInfo'),
            loadingSpinner: document.getElementById('loadingSpinner'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            retryBtn: document.getElementById('retryBtn'),
            batchIdDisplay: document.getElementById('batchIdDisplay'),
            cardsCreated: document.getElementById('cardsCreated'),
            activeCount: document.getElementById('activeCount'),
            totalScans: document.getElementById('totalScans'),
            cardsContainer: document.getElementById('cardsContainer'),
            addMoreLink: document.getElementById('addMoreLink'),
            notification: document.getElementById('notification'),
            backBtn: document.getElementById('backBtn'),
            batchTagline: document.getElementById('batchTagline')
        };
        
        function showNotification(message, type = 'success') {
            elements.notification.textContent = message;
            elements.notification.className = `notification ${type}`;
            elements.notification.classList.add('show');
            setTimeout(() => {
                elements.notification.classList.remove('show');
            }, 3000);
        }
        
        function downloadQRCode(qrUrl, filename) {
            const link = document.createElement('a');
            link.href = qrUrl;
            link.download = `papir_${filename}_qr.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('QR code downloaded', 'success');
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('URL copied to clipboard!', 'success');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('URL copied!', 'success');
            });
        }
        
        function saveRecentBatch(batchId) {
            // Add to recent list, avoid duplicates, keep last 5
            recentBatches = recentBatches.filter(id => id !== batchId);
            recentBatches.unshift(batchId);
            recentBatches = recentBatches.slice(0, 5);
            localStorage.setItem('recentBatches', JSON.stringify(recentBatches));
            displayRecentBatches();
        }
        
        function displayRecentBatches() {
            if (recentBatches.length > 0) {
                elements.recentBatches.style.display = 'block';
                let html = '';
                recentBatches.forEach(id => {
                    html += `<span class="recent-badge" onclick="loadBatchById('${id}')">${id}</span>`;
                });
                elements.recentList.innerHTML = html;
            } else {
                elements.recentBatches.style.display = 'none';
            }
        }
        
        async function loadBatchById(batchId) {
            if (!batchId) return;
            
            // Update URL without reloading
            const newUrl = `${window.location.pathname}?batch=${encodeURIComponent(batchId)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            
            elements.batchSearchInput.value = batchId;
            await loadBatch(batchId);
        }
        
        async function loadBatch(batchId) {
            if (!batchId) {
                showError('Please enter a Batch ID');
                return;
            }
            
            elements.loadingSpinner.style.display = 'block';
            elements.batchInfo.style.display = 'none';
            elements.errorMessage.style.display = 'none';
            
            try {
                console.log('Fetching batch:', `${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                const response = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        // Check if cards exist with this batch_id but no batch record
                        const cardsResponse = await fetch(`${BACKEND_URL}/api/cards?batch_id=${encodeURIComponent(batchId)}`);
                        if (cardsResponse.ok) {
                            const cardsResult = await cardsResponse.json();
                            if (cardsResult.cards && cardsResult.cards.length > 0) {
                                // Create batch record automatically
                                console.log('Cards found but no batch record - creating one');
                                await createBatchRecord(batchId);
                                // Retry loading
                                const retryResponse = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                                if (retryResponse.ok) {
                                    const result = await retryResponse.json();
                                    if (result.success) {
                                        currentBatch = result.batch;
                                        currentCards = result.cards;
                                        saveRecentBatch(batchId);
                                        displayBatch();
                                        return;
                                    }
                                }
                            }
                        }
                        throw new Error('Batch not found. Please check the batch ID.');
                    }
                    throw new Error(`Server returned ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    currentBatch = result.batch;
                    currentCards = result.cards;
                    saveRecentBatch(batchId);
                    displayBatch();
                } else {
                    throw new Error(result.error || 'Failed to load batch');
                }
            } catch (error) {
                console.error('Error loading batch:', error);
                showError(error.message);
            }
        }
        
        async function createBatchRecord(batchId) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/batches`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        batch_id: batchId,
                        total_cards: 0
                    })
                });
                if (response.ok) {
                    console.log('Batch record created automatically');
                }
            } catch (error) {
                console.error('Failed to create batch record:', error);
            }
        }
        
        function displayBatch() {
            elements.loadingSpinner.style.display = 'none';
            elements.batchInfo.style.display = 'block';
            elements.errorMessage.style.display = 'none';
            
            elements.batchIdDisplay.textContent = currentBatch.batch_id;
            elements.batchTagline.textContent = `Managing batch: ${currentBatch.batch_id}`;
            elements.cardsCreated.textContent = currentCards.length;
            
            const activeCards = currentCards.filter(c => c.status === 'active').length;
            elements.activeCount.textContent = activeCards;
            
            const totalScans = currentCards.reduce((sum, card) => sum + (card.scan_count || 0), 0);
            elements.totalScans.textContent = totalScans;
            
            // Set add more link
            elements.addMoreLink.href = `/maker.html?batch=${encodeURIComponent(currentBatch.batch_id)}`;
            
            // Display cards
            let cardsHtml = '';
            if (currentCards.length === 0) {
                cardsHtml = '<div class="no-cards">No cards in this batch yet. Click "Add More Cards" to create some.</div>';
            } else {
                currentCards.forEach(card => {
                    const viewerUrl = `${BACKEND_URL}/viewer.html?card=${card.card_id}`;
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(viewerUrl)}&format=png&margin=5`;
                    
                    const statusClass = card.status === 'active' ? 'status-active' : 'status-pending';
                    
                    cardsHtml += `
                        <div class="card-item">
                            <div class="card-order">Card #${card.batch_order}</div>
                            <span class="status-badge ${statusClass}">${card.status}</span>
                            <div class="card-id">${card.card_id}</div>
                            
                            <div class="qr-container">
                                <img src="${qrUrl}" alt="QR Code" class="qr-small">
                                <div class="qr-actions">
                                    <button class="qr-action-btn copy" onclick="copyToClipboard('${viewerUrl}')">
                                        <i class="fas fa-copy"></i> URL
                                    </button>
                                    <button class="qr-action-btn download" onclick="downloadQRCode('${qrUrl}', '${card.card_id}')">
                                        <i class="fas fa-download"></i> QR
                                    </button>
                                </div>
                            </div>
                            
                            <div class="card-actions">
                                <button class="action-btn view-btn" onclick="window.open('${viewerUrl}', '_blank')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                                <button class="action-btn copy-btn" onclick="copyToClipboard('${viewerUrl}')">
                                    <i class="fas fa-copy"></i> Copy URL
                                </button>
                                <button class="action-btn download-btn" onclick="downloadQRCode('${qrUrl}', '${card.card_id}')">
                                    <i class="fas fa-download"></i> QR
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            
            elements.cardsContainer.innerHTML = cardsHtml;
        }
        
        function showError(message) {
            elements.loadingSpinner.style.display = 'none';
            elements.batchInfo.style.display = 'none';
            elements.errorMessage.style.display = 'block';
            elements.errorText.textContent = message;
        }
        
        // Event listeners
        elements.searchBtn.addEventListener('click', () => {
            const batchId = elements.batchSearchInput.value.trim();
            if (batchId) {
                loadBatchById(batchId);
            } else {
                showNotification('Please enter a Batch ID', 'error');
            }
        });
        
        elements.batchSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const batchId = elements.batchSearchInput.value.trim();
                if (batchId) {
                    loadBatchById(batchId);
                }
            }
        });
        
        elements.retryBtn.addEventListener('click', () => {
            const batchId = elements.batchSearchInput.value.trim() || urlBatchId;
            if (batchId) {
                loadBatch(batchId);
            }
        });
        
        // Initialize
        displayRecentBatches();
        
        if (urlBatchId) {
            elements.batchSearchInput.value = urlBatchId;
            loadBatch(urlBatchId);
        }
        
        // Make functions global for onclick handlers
        window.copyToClipboard = copyToClipboard;
        window.downloadQRCode = downloadQRCode;
        window.loadBatchById = loadBatchById;
        
    </script>
