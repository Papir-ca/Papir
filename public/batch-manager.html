<script>
    const BACKEND_URL = 'https://papir.ca';
    
    // Get batch ID from URL and decode it
    const urlParams = new URLSearchParams(window.location.search);
    const encodedBatchId = urlParams.get('batch');
    const batchId = encodedBatchId ? decodeURIComponent(encodedBatchId) : null;
    
    console.log('Loading batch:', batchId);
    
    let currentBatch = null;
    let currentCards = [];
    
    const elements = {
        batchInfo: document.getElementById('batchInfo'),
        loadingSpinner: document.getElementById('loadingSpinner'),
        errorMessage: document.getElementById('errorMessage'),
        errorText: document.getElementById('errorText'),
        batchIdDisplay: document.getElementById('batchIdDisplay'),
        cardsCreated: document.getElementById('cardsCreated'),
        maxAllowed: document.getElementById('maxAllowed'),
        remainingSlots: document.getElementById('remainingSlots'),
        cardsContainer: document.getElementById('cardsContainer'),
        addMoreSection: document.getElementById('addMoreSection'),
        additionalQuantity: document.getElementById('additionalQuantity'),
        calculatePriceBtn: document.getElementById('calculatePriceBtn'),
        priceDisplay: document.getElementById('priceDisplay'),
        pricePerCard: document.getElementById('pricePerCard'),
        priceQuantity: document.getElementById('priceQuantity'),
        totalPrice: document.getElementById('totalPrice'),
        checkoutBtn: document.getElementById('checkoutBtn'),
        notification: document.getElementById('notification')
    };
    
    function showNotification(message, type = 'success') {
        elements.notification.textContent = message;
        elements.notification.className = `notification ${type}`;
        elements.notification.classList.add('show');
        setTimeout(() => {
            elements.notification.classList.remove('show');
        }, 3000);
    }
    
    function downloadQRCode(qrUrl, filename) {
        const link = document.createElement('a');
        link.href = qrUrl;
        link.download = `papir_${filename}_qr.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showNotification('URL copied to clipboard!', 'success');
        }).catch(() => {
            showNotification('Failed to copy', 'error');
        });
    }
    
    async function loadBatch() {
        if (!batchId) {
            showError('No batch ID provided');
            return;
        }
        
        try {
            console.log('Fetching batch:', `${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
            const response = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
            
            if (!response.ok) {
                throw new Error(`Server returned ${response.status}`);
            }
            
            const result = await response.json();
            
            if (result.success) {
                currentBatch = result.batch;
                currentCards = result.cards;
                
                displayBatch();
            } else {
                throw new Error(result.error || 'Failed to load batch');
            }
        } catch (error) {
            console.error('Error loading batch:', error);
            showError(error.message);
        }
    }
    
    function displayBatch() {
        elements.loadingSpinner.style.display = 'none';
        elements.batchInfo.style.display = 'block';
        
        elements.batchIdDisplay.textContent = currentBatch.batch_id;
        elements.cardsCreated.textContent = currentBatch.cards_created;
        elements.maxAllowed.textContent = currentBatch.max_cards_allowed;
        
        const remaining = currentBatch.max_cards_allowed - currentBatch.cards_created;
        elements.remainingSlots.textContent = remaining;
        
        if (remaining <= 0) {
            elements.addMoreSection.style.display = 'none';
        }
        
        // Display cards
        let cardsHtml = '';
        currentCards.forEach(card => {
            const viewerUrl = `${BACKEND_URL}/viewer.html?card=${card.card_id}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(viewerUrl)}&format=png&margin=5`;
            
            const statusClass = card.status === 'active' ? 'status-active' : 'status-pending';
            
            cardsHtml += `
                <div class="card-item">
                    <div class="card-order">Card #${card.batch_order}</div>
                    <div class="card-id">${card.card_id}</div>
                    <span class="status-badge ${statusClass}">${card.status}</span>
                    <img src="${qrUrl}" alt="QR Code" class="qr-small">
                    <div class="card-actions">
                        <button class="action-btn copy-btn" onclick="copyToClipboard('${viewerUrl}')">
                            <i class="fas fa-copy"></i> URL
                        </button>
                        <button class="action-btn download-btn" onclick="downloadQRCode('${qrUrl}', '${card.card_id}')">
                            <i class="fas fa-download"></i> QR
                        </button>
                    </div>
                </div>
            `;
        });
        
        elements.cardsContainer.innerHTML = cardsHtml;
    }
    
    function showError(message) {
        elements.loadingSpinner.style.display = 'none';
        elements.errorMessage.style.display = 'block';
        elements.errorText.textContent = message;
    }
    
    // Calculate price
    elements.calculatePriceBtn.addEventListener('click', async function() {
        const quantity = parseInt(elements.additionalQuantity.value);
        
        if (quantity < 1 || quantity > 100) {
            showNotification('Please enter a quantity between 1 and 100', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/batches/calculate-price`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    batch_id: batchId,
                    additional_quantity: quantity
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                elements.pricePerCard.textContent = `$${result.price_per_card.toFixed(2)}`;
                elements.priceQuantity.textContent = result.quantity;
                elements.totalPrice.textContent = result.formatted_total;
                elements.priceDisplay.style.display = 'block';
            }
        } catch (error) {
            console.error('Price calculation error:', error);
            showNotification('Error calculating price', 'error');
        }
    });
    
    // Handle adding more cards
    elements.checkoutBtn.addEventListener('click', async function() {
        const quantity = parseInt(elements.additionalQuantity.value);
        
        showNotification('Redirecting to maker page to add cards...', 'info');
        
        // Redirect to maker page with batch info
        setTimeout(() => {
            window.location.href = `/maker.html?batch=${encodeURIComponent(batchId)}&add=${quantity}`;
        }, 1500);
    });
    
    // Initialize
    if (!batchId) {
        showError('No batch ID provided. Please use the link from your batch creation.');
    } else {
        loadBatch();
    }
</script>
