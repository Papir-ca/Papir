<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Manager | Papir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0 40px 0;
            position: relative;
        }
        
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF6B6B, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .batch-header {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .batch-title {
            font-size: 2rem;
            color: #06D6A0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #06D6A0;
        }
        
        .stat-value {
            font-size: 2rem;
            color: #06D6A0;
            font-weight: bold;
        }
        
        .stat-label {
            color: #a0aec0;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card-item {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: #06D6A0;
        }
        
        .card-order {
            font-size: 1rem;
            color: #06D6A0;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .card-id {
            font-family: monospace;
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 15px;
            word-break: break-all;
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
        }
        
        .qr-small {
            width: 150px;
            height: 150px;
            margin: 10px auto;
            display: block;
            border: 2px solid white;
            border-radius: 5px;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .action-btn.copy-btn {
            background: #06D6A0;
            color: black;
        }
        
        .action-btn.download-btn {
            background: #f39c12;
            color: black;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .status-active {
            background: #2ecc71;
            color: black;
        }
        
        .status-pending {
            background: #f39c12;
            color: black;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #06D6A0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.5s;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .notification.success {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }
        
        .notification.error {
            background: linear-gradient(to right, #FF6B6B, #FF8E53);
        }
        
        .add-more-btn {
            background: #f39c12;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .add-more-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="maker.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Creator
    </a>
    
    <div class="container">
        <header>
            <h1 class="logo">📦 Papir Batch Manager</h1>
            <p class="tagline">View and manage all cards in your batch</p>
        </header>
        
        <div id="batchInfo" style="display: none;">
            <div class="batch-header">
                <div class="batch-title">
                    <i class="fas fa-layer-group"></i>
                    <span id="batchIdDisplay"></span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="cardsCreated">0</div>
                        <div class="stat-label">Cards in Batch</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeCount">0</div>
                        <div class="stat-label">Active Cards</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalScans">0</div>
                        <div class="stat-label">Total Scans</div>
                    </div>
                </div>
            </div>
            
            <div id="cardsContainer" class="cards-grid">
                <!-- Cards will be loaded here -->
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/maker.html?batch=${encodeURIComponent(batchId)}" class="add-more-btn">
                    <i class="fas fa-plus-circle"></i> Add More Cards to This Batch
                </a>
            </div>
        </div>
        
        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            <div>Loading batch information...</div>
        </div>
        
        <div id="errorMessage" style="display: none; text-align: center; padding: 40px; color: #e74c3c;">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h3>Error Loading Batch</h3>
            <p id="errorText"></p>
            <button class="btn btn-secondary" onclick="location.reload()" style="margin-top: 20px; background: #444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                <i class="fas fa-sync-alt"></i> Try Again
            </button>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const BACKEND_URL = 'https://papir.ca';
        
        // Get batch ID from URL and decode it
        const urlParams = new URLSearchParams(window.location.search);
        const encodedBatchId = urlParams.get('batch');
        const batchId = encodedBatchId ? decodeURIComponent(encodedBatchId) : null;
        
        let currentBatch = null;
        let currentCards = [];
        
        const elements = {
            batchInfo: document.getElementById('batchInfo'),
            loadingSpinner: document.getElementById('loadingSpinner'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            batchIdDisplay: document.getElementById('batchIdDisplay'),
            cardsCreated: document.getElementById('cardsCreated'),
            activeCount: document.getElementById('activeCount'),
            totalScans: document.getElementById('totalScans'),
            cardsContainer: document.getElementById('cardsContainer'),
            notification: document.getElementById('notification')
        };
        
        function showNotification(message, type = 'success') {
            elements.notification.textContent = message;
            elements.notification.className = `notification ${type}`;
            elements.notification.classList.add('show');
            setTimeout(() => {
                elements.notification.classList.remove('show');
            }, 3000);
        }
        
        function downloadQRCode(qrUrl, filename) {
            const link = document.createElement('a');
            link.href = qrUrl;
            link.download = `papir_${filename}_qr.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('URL copied to clipboard!', 'success');
            }).catch(() => {
                showNotification('Failed to copy', 'error');
            });
        }
        
        async function loadBatch() {
            if (!batchId) {
                showError('No batch ID provided');
                return;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    currentBatch = result.batch;
                    currentCards = result.cards;
                    
                    displayBatch();
                } else {
                    throw new Error(result.error || 'Failed to load batch');
                }
            } catch (error) {
                console.error('Error loading batch:', error);
                showError(error.message);
            }
        }
        
        function displayBatch() {
            elements.loadingSpinner.style.display = 'none';
            elements.batchInfo.style.display = 'block';
            
            elements.batchIdDisplay.textContent = currentBatch.batch_id;
            elements.cardsCreated.textContent = currentCards.length;
            
            const activeCards = currentCards.filter(c => c.status === 'active').length;
            elements.activeCount.textContent = activeCards;
            
            const totalScans = currentCards.reduce((sum, card) => sum + (card.scan_count || 0), 0);
            elements.totalScans.textContent = totalScans;
            
            // Display cards
            let cardsHtml = '';
            currentCards.forEach(card => {
                const viewerUrl = `${BACKEND_URL}/viewer.html?card=${card.card_id}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(viewerUrl)}&format=png&margin=5`;
                
                const statusClass = card.status === 'active' ? 'status-active' : 'status-pending';
                
                cardsHtml += `
                    <div class="card-item">
                        <div class="card-order">Card #${card.batch_order}</div>
                        <span class="status-badge ${statusClass}">${card.status}</span>
                        <div class="card-id">${card.card_id}</div>
                        <img src="${qrUrl}" alt="QR Code" class="qr-small">
                        <div class="card-actions">
                            <button class="action-btn copy-btn" onclick="copyToClipboard('${viewerUrl}')">
                                <i class="fas fa-copy"></i> URL
                            </button>
                            <button class="action-btn download-btn" onclick="downloadQRCode('${qrUrl}', '${card.card_id}')">
                                <i class="fas fa-download"></i> QR
                            </button>
                        </div>
                    </div>
                `;
            });
            
            elements.cardsContainer.innerHTML = cardsHtml;
        }
        
        function showError(message) {
            elements.loadingSpinner.style.display = 'none';
            elements.errorMessage.style.display = 'block';
            elements.errorText.textContent = message;
        }
        
        // Initialize
        if (!batchId) {
            showError('No batch ID provided. Please use the link from your batch creation.');
        } else {
            loadBatch();
        }
    </script>
</body>
</html>
