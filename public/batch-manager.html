<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Manager | Papir</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0 40px 0;
            position: relative;
        }
        
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF6B6B, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .search-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .search-title {
            color: #06D6A0;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #06D6A0;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .search-btn {
            background: #06D6A0;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-btn:hover {
            background: #0ef7b9;
            transform: translateY(-2px);
        }
        
        .recent-batches {
            margin-top: 20px;
        }
        
        .recent-title {
            color: #a0aec0;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .recent-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .recent-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .recent-badge:hover {
            background: #06D6A0;
            color: black;
            border-color: #06D6A0;
        }
        
        .batch-header {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .batch-title {
            font-size: 2rem;
            color: #06D6A0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #06D6A0;
        }
        
        .stat-value {
            font-size: 2rem;
            color: #06D6A0;
            font-weight: bold;
        }
        
        .stat-label {
            color: #a0aec0;
            margin-top: 5px;
        }
        
        /* Cards container with scroll */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(224px, 1fr));
            gap: 20px;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .card-item {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: #06D6A0;
        }
        
        .card-order {
            font-size: 0.9rem;
            color: #06D6A0;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .card-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: #a0aec0;
            margin-bottom: 12px;
            word-break: break-all;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 4px;
        }
        
        .qr-container {
            margin: 12px 0;
            text-align: center;
        }
        
        .qr-small {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            display: block;
            border: 2px solid white;
            border-radius: 5px;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .action-btn.view-btn {
            background: #BCAE83;
            color: black;
        }
        
        .action-btn.copy-btn {
            background: #06D6A0;
            color: black;
        }
        
        .action-btn.download-btn {
            background: #f39c12;
            color: black;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .status-active {
            background: #2ecc71;
            color: black;
        }
        
        .status-pending {
            background: #f39c12;
            color: black;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #06D6A0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.5s;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .notification.success {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }
        
        .notification.error {
            background: linear-gradient(to right, #FF6B6B, #FF8E53);
        }
        
        .notification.info {
            background: linear-gradient(to right, #36D1DC, #5B86E5);
        }
        
        /* Add More Cards Section (simplified) */
        .add-more-section {
            background: rgba(6, 214, 160, 0.1);
            border: 2px solid #06D6A0;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
            text-align: center;
        }
        
        .add-more-section h3 {
            color: #06D6A0;
            margin-bottom: 10px;
        }
        
        .add-more-section p {
            color: #a0aec0;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .quick-add-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .qty-wrapper {
            position: relative;
        }
        
        .qty-wrapper input {
            width: 80px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #444;
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-size: 1.2rem;
        }
        
        .qty-wrapper span {
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
        }
        
        .quick-add-btn {
            background: #06D6A0;
            color: #1a1a1a;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-add-btn:hover {
            background: #0ef7b9;
            transform: translateY(-2px);
        }
        
        .card-element-container {
            margin: 20px auto;
            max-width: 400px;
            text-align: left;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        
        .card-element-container label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 0.9rem;
        }
        
        #card-element {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #555;
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            display: none;
        }
        
        .error-message i {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .error-message button {
            background: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .error-message button:hover {
            background: #555;
        }
        
        .no-cards {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px;
            color: #aaa;
            background: #2a2a2a;
            border-radius: 10px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
                max-height: 500px;
            }
            
            .back-button {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 20px;
                display: inline-block;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
                justify-content: center;
            }
            
            .card-actions {
                flex-direction: column;
            }
            
            .quick-add-controls {
                flex-direction: column;
            }
            
            .qty-wrapper span {
                position: static;
                transform: none;
                display: inline-block;
                margin-left: 10px;
            }
        }
    </style>
</head>
<body>
    <a href="/maker.html" class="back-button" id="backBtn">
        <i class="fas fa-arrow-left"></i> Back to Creator
    </a>
    
    <div class="container">
        <header>
            <h1 class="logo">📦 Papir Batch Manager</h1>
            <p class="tagline" id="batchTagline">Search, view, and manage all your card batches</p>
        </header>
        
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-title">
                <i class="fas fa-search"></i> Find a Batch
            </div>
            
            <div class="search-box">
                <input type="text" id="batchSearchInput" class="search-input" placeholder="Enter Batch ID (e.g., wedding, WEDDING-2024, event123)" value="">
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> Load Batch
                </button>
            </div>
            
            <div class="recent-batches" id="recentBatches" style="display: none;">
                <div class="recent-title">Recent Batches:</div>
                <div class="recent-list" id="recentList"></div>
            </div>
        </div>
        
        <div id="batchInfo" style="display: none;">
            <div class="batch-header">
                <div class="batch-title">
                    <i class="fas fa-layer-group"></i>
                    <span id="batchIdDisplay"></span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="cardsCreated">0</div>
                        <div class="stat-label">Cards in Batch</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeCount">0</div>
                        <div class="stat-label">Active Cards</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalScans">0</div>
                        <div class="stat-label">Total Scans</div>
                    </div>
                </div>
            </div>
            
            <div id="cardsContainer" class="cards-grid">
                <!-- Cards will be loaded here -->
            </div>
            
            <!-- Add More Cards Section (simplified) -->
            <div class="add-more-section">
                <h3><i class="fas fa-plus-circle"></i> Add More Cards</h3>
                <p>Same design. Same message. $2.99 each.</p>
                
                <div class="quick-add-controls">
                    <div class="qty-wrapper">
                        <input type="number" id="additionalQty" value="5" min="1" max="500">
                        <span>cards</span>
                    </div>
                    <button class="quick-add-btn" id="quickAddBtn">Add Cards — $14.95</button>
                </div>
                
                <!-- Stripe Card Element (visible) -->
                <div class="card-element-container" id="cardElementContainer">
                    <label>Card Details</label>
                    <div id="card-element"></div>
                    <div id="card-errors" style="color: #FF6B6B; font-size: 0.85rem; margin-top: 8px;"></div>
                </div>
            </div>
        </div>
        
        <div id="loadingSpinner" class="loading" style="display: none;">
            <div class="spinner"></div>
            <div>Loading batch information...</div>
        </div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Error Loading Batch</h3>
            <p id="errorText"></p>
            <button id="retryBtn">
                <i class="fas fa-sync-alt"></i> Try Again
            </button>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const BACKEND_URL = 'https://papir.ca';
        
        // Get batch ID from URL and decode it
        const urlParams = new URLSearchParams(window.location.search);
        const encodedBatchId = urlParams.get('batch');
        const urlBatchId = encodedBatchId ? decodeURIComponent(encodedBatchId) : null;
        
        console.log('Initial URL batch:', urlBatchId);
        
        let currentBatch = null;
        let currentCards = [];
        let recentBatches = JSON.parse(localStorage.getItem('recentBatches') || '[]');
        
        // Stripe
        let stripe = null;
        let cardElement = null;
        let elementsStripe = null; // avoid naming conflict with existing elements object
        
        const elements = {
            batchSearchInput: document.getElementById('batchSearchInput'),
            searchBtn: document.getElementById('searchBtn'),
            recentBatches: document.getElementById('recentBatches'),
            recentList: document.getElementById('recentList'),
            batchInfo: document.getElementById('batchInfo'),
            loadingSpinner: document.getElementById('loadingSpinner'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            retryBtn: document.getElementById('retryBtn'),
            batchIdDisplay: document.getElementById('batchIdDisplay'),
            cardsCreated: document.getElementById('cardsCreated'),
            activeCount: document.getElementById('activeCount'),
            totalScans: document.getElementById('totalScans'),
            cardsContainer: document.getElementById('cardsContainer'),
            additionalQty: document.getElementById('additionalQty'),
            quickAddBtn: document.getElementById('quickAddBtn'),
            notification: document.getElementById('notification'),
            backBtn: document.getElementById('backBtn'),
            batchTagline: document.getElementById('batchTagline'),
            cardElementContainer: document.getElementById('cardElementContainer'),
            cardErrors: document.getElementById('card-errors')
        };
        
        function showNotification(message, type = 'success') {
            elements.notification.textContent = message;
            elements.notification.className = `notification ${type}`;
            elements.notification.classList.add('show');
            setTimeout(() => {
                elements.notification.classList.remove('show');
            }, 3000);
        }
        
        function downloadQRCode(qrUrl, filename) {
            const link = document.createElement('a');
            link.href = qrUrl;
            link.download = `papir_${filename}_qr.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('QR code downloaded', 'success');
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('URL copied to clipboard!', 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('URL copied!', 'success');
            });
        }
        
        function saveRecentBatch(batchId) {
            recentBatches = recentBatches.filter(id => id !== batchId);
            recentBatches.unshift(batchId);
            recentBatches = recentBatches.slice(0, 5);
            localStorage.setItem('recentBatches', JSON.stringify(recentBatches));
            displayRecentBatches();
        }
        
        function displayRecentBatches() {
            if (recentBatches.length > 0) {
                elements.recentBatches.style.display = 'block';
                let html = '';
                recentBatches.forEach(id => {
                    html += `<span class="recent-badge" data-batch="${id}">${id}</span>`;
                });
                elements.recentList.innerHTML = html;
                
                document.querySelectorAll('.recent-badge').forEach(badge => {
                    badge.addEventListener('click', function() {
                        const batchId = this.dataset.batch;
                        loadBatchById(batchId);
                    });
                });
            } else {
                elements.recentBatches.style.display = 'none';
            }
        }
        
        async function loadBatchById(batchId) {
            if (!batchId) return;
            const newUrl = `${window.location.pathname}?batch=${encodeURIComponent(batchId)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            elements.batchSearchInput.value = batchId;
            await loadBatch(batchId);
        }
        
        async function loadBatch(batchId) {
            if (!batchId) {
                showError('Please enter a Batch ID');
                return;
            }
            
            elements.loadingSpinner.style.display = 'block';
            elements.batchInfo.style.display = 'none';
            elements.errorMessage.style.display = 'none';
            
            try {
                console.log('Fetching batch:', `${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                const response = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(batchId)}`);
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error('Batch not found. Please check the batch ID.');
                    throw new Error(`Server returned ${response.status}`);
                }
                
                const result = await response.json();
                if (result.success) {
                    currentBatch = result.batch;
                    currentCards = result.cards;
                    saveRecentBatch(batchId);
                    displayBatch();
                } else {
                    throw new Error(result.error || 'Failed to load batch');
                }
            } catch (error) {
                console.error('Error loading batch:', error);
                showError(error.message);
            }
        }
        
        function displayBatch() {
            elements.loadingSpinner.style.display = 'none';
            elements.batchInfo.style.display = 'block';
            elements.errorMessage.style.display = 'none';
            
            elements.batchIdDisplay.textContent = currentBatch.batch_id;
            elements.batchTagline.textContent = `Managing batch: ${currentBatch.batch_id}`;
            elements.cardsCreated.textContent = currentCards.length;
            
            const activeCards = currentCards.filter(c => c.status === 'active').length;
            elements.activeCount.textContent = activeCards;
            
            const totalScans = currentCards.reduce((sum, card) => sum + (card.scan_count || 0), 0);
            elements.totalScans.textContent = totalScans;
            
            let cardsHtml = '';
            if (currentCards.length === 0) {
                cardsHtml = '<div class="no-cards">No cards in this batch yet. Click "Add More Cards" to create some.</div>';
            } else {
                currentCards.forEach((card, index) => {
                    const viewerUrl = `${BACKEND_URL}/viewer.html?card=${card.card_id}`;
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(viewerUrl)}&format=png&margin=5`;
                    const statusClass = card.status === 'active' ? 'status-active' : 'status-pending';
                    
                    cardsHtml += `
                        <div class="card-item" data-card-id="${card.card_id}" data-viewer-url="${viewerUrl}" data-qr-url="${qrUrl}">
                            <div class="card-order">Card #${card.batch_order}</div>
                            <span class="status-badge ${statusClass}">${card.status}</span>
                            <div class="card-id">${card.card_id}</div>
                            <div class="qr-container">
                                <img src="${qrUrl}" alt="QR Code" class="qr-small">
                            </div>
                            <div class="card-actions">
                                <button class="action-btn view-btn" data-action="view" data-index="${index}">
                                    <i class="fas fa-eye"></i> View Card
                                </button>
                                <button class="action-btn copy-btn" data-action="copy" data-index="${index}">
                                    <i class="fas fa-copy"></i> Copy URL
                                </button>
                                <button class="action-btn download-btn" data-action="download" data-index="${index}">
                                    <i class="fas fa-download"></i> Download QR
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            
            elements.cardsContainer.innerHTML = cardsHtml;
            
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const action = this.dataset.action;
                    const cardItem = this.closest('.card-item');
                    const cardId = cardItem.dataset.cardId;
                    const viewerUrl = cardItem.dataset.viewerUrl;
                    const qrUrl = cardItem.dataset.qrUrl;
                    
                    if (action === 'view') window.open(viewerUrl, '_blank');
                    else if (action === 'copy') copyToClipboard(viewerUrl);
                    else if (action === 'download') downloadQRCode(qrUrl, cardId);
                });
            });
        }
        
        function showError(message) {
            elements.loadingSpinner.style.display = 'none';
            elements.batchInfo.style.display = 'none';
            elements.errorMessage.style.display = 'block';
            elements.errorText.textContent = message;
        }
        
        // ---------- Stripe Quick Add Cards ----------
        async function initStripe() {
            try {
                const keyRes = await fetch(`${BACKEND_URL}/api/stripe-key`);
                const keyData = await keyRes.json();
                if (!keyData.success) throw new Error('Payment system not available');
                
                stripe = Stripe(keyData.publishableKey);
                elementsStripe = stripe.elements();
                cardElement = elementsStripe.create('card', {
                    style: {
                        base: {
                            color: '#ffffff',
                            fontFamily: '"Segoe UI", sans-serif',
                            fontSize: '16px',
                            '::placeholder': { color: '#666' }
                        }
                    }
                });
                cardElement.mount('#card-element');
                
                cardElement.on('change', (event) => {
                    if (event.error) {
                        elements.cardErrors.textContent = event.error.message;
                    } else {
                        elements.cardErrors.textContent = '';
                    }
                });
            } catch (err) {
                console.error('Stripe init error:', err);
                showNotification('Payment system error. Please refresh.', 'error');
            }
        }
        
        function updatePrice() {
            const qty = parseInt(elements.additionalQty.value) || 0;
            const total = (qty * 2.99).toFixed(2);
            elements.quickAddBtn.innerHTML = `Add Cards — $${total}`;
        }
        
        elements.additionalQty.addEventListener('input', updatePrice);
        updatePrice();
        
        async function quickAddCards() {
            const qty = parseInt(elements.additionalQty.value);
            if (!qty || qty < 1) {
                showNotification('Please enter at least 1 card', 'error');
                return;
            }
            
            if (!stripe) {
                showNotification('Payment system not ready. Please wait.', 'error');
                return;
            }
            
            const btn = elements.quickAddBtn;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            
            try {
                // 1. Create payment intent
                const response = await fetch(`${BACKEND_URL}/api/create-payment-intent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        quantity: qty,
                        batchId: currentBatch.batch_id,
                        email: '',
                        mode: 'add_to_existing'
                    })
                });
                
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Payment setup failed');
                
                // 2. Confirm card payment with Stripe
                const result = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: { email: '' }
                    }
                });
                
                if (result.error) {
                    throw new Error(result.error.message);
                }
                
                // 3. Payment succeeded – add the cards
                const addResponse = await fetch(`${BACKEND_URL}/api/batches/${encodeURIComponent(currentBatch.batch_id)}/add-cards`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        quantity: qty,
                        payment_intent_id: result.paymentIntent.id
                    })
                });
                
                const addData = await addResponse.json();
                if (!addData.success) throw new Error(addData.error);
                
                // 4. Success – refresh the batch view
                showNotification(`Successfully added ${qty} cards!`, 'success');
                await loadBatch(currentBatch.batch_id);
                
                // Clear card element
                cardElement.clear();
                
            } catch (err) {
                showNotification(err.message, 'error');
                console.error('Add cards error:', err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        elements.quickAddBtn.addEventListener('click', quickAddCards);
        
        // ---------- Event Listeners ----------
        elements.searchBtn.addEventListener('click', () => {
            const batchId = elements.batchSearchInput.value.trim();
            if (batchId) loadBatchById(batchId);
            else showNotification('Please enter a Batch ID', 'error');
        });
        
        elements.batchSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const batchId = elements.batchSearchInput.value.trim();
                if (batchId) loadBatchById(batchId);
            }
        });
        
        elements.retryBtn.addEventListener('click', () => {
            const batchId = elements.batchSearchInput.value.trim() || urlBatchId;
            if (batchId) loadBatch(batchId);
        });
        
        // Initialize
        displayRecentBatches();
        initStripe();
        
        if (urlBatchId) {
            console.log('Auto-loading batch from URL:', urlBatchId);
            loadBatchById(urlBatchId);
        }
    </script>
</body>
</html>
