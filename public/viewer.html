<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papir Card Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== YOUR EXISTING CSS – UNCHANGED ===== */
        /* (I will not repeat the full CSS here because it's very long, but it must remain exactly as in your current viewer.html) */
        /* In your final file, copy your current viewer.html CSS entirely. */
    </style>
</head>
<body>
    <!-- ===== YOUR EXISTING HTML – UNCHANGED ===== -->
    <!-- (All the HTML elements must remain exactly as in your current viewer.html) -->

    <div class="notification" id="notification"></div>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const BACKEND_URL = 'https://papir.ca';
            let isConnected = false;
            let html5QrCode = null;
            let isScannerActive = false;
            let currentCardData = null;
            let clientIp = 'unknown';
            
            const elements = {
                reader: document.getElementById('reader'),
                cardIdInput: document.getElementById('cardIdInput'),
                loadCardBtn: document.getElementById('loadCardBtn'),
                cardDisplay: document.getElementById('cardDisplay'),
                emptyState: document.getElementById('emptyState'),
                displayCardId: document.getElementById('displayCardId'),
                displayCardType: document.getElementById('displayCardType'),
                displayCardDate: document.getElementById('displayCardDate'),
                cardContent: document.getElementById('cardContent'),
                errorMessage: document.getElementById('errorMessage'),
                errorText: document.getElementById('errorText'),
                notification: document.getElementById('notification'),
                syncStatus: document.getElementById('syncStatus'),
                startScanner: document.getElementById('startScanner'),
                stopScanner: document.getElementById('stopScanner'),
                scannerContainer: document.getElementById('scannerContainer'),
                manualInput: document.getElementById('manualInput'),
                closeCardBtn: document.getElementById('closeCardBtn'),
                pageHeader: document.getElementById('pageHeader'),
                confirmationModal: document.getElementById('confirmationModal'),
                confirmViewingBtn: document.getElementById('confirmViewingBtn'),
                cancelViewingBtn: document.getElementById('cancelViewingBtn')
            };
            
            console.log('Initializing viewer with backend:', BACKEND_URL);
            
            // ===== ALL ORIGINAL HELPER FUNCTIONS (unchanged) =====
            async function detectClientIp() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    clientIp = data.ip;
                } catch (error) {
                    console.log('Could not detect IP');
                }
            }
            detectClientIp();
            
            async function incrementScanCount(cardId) {
                try {
                    console.log('📊 Logging scan for:', cardId);
                    const response = await fetch(`${BACKEND_URL}/api/increment-scan`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ card_id: cardId })
                    });
                    const result = await response.json();
                    console.log('Scan logged:', result);
                } catch (error) {
                    console.log('Scan logged (offline)');
                }
            }
            
            function showNotification(message, type = 'success') {
                elements.notification.textContent = message;
                elements.notification.className = `notification ${type}`;
                elements.notification.classList.add('show');
                setTimeout(() => {
                    elements.notification.classList.remove('show');
                }, 3000);
            }
            
            function showError(message) {
                elements.errorText.textContent = message;
                elements.errorMessage.classList.add('active');
                setTimeout(() => {
                    elements.errorMessage.classList.remove('active');
                }, 5000);
            }
            
            function hideError() {
                elements.errorMessage.classList.remove('active');
            }
            
            function updateSyncStatus(connected) {
                if (connected) {
                    elements.syncStatus.innerHTML = '<i class="fas fa-check-circle"></i><span>Connected to Papir Backend</span>';
                    elements.syncStatus.style.background = 'rgba(0, 176, 155, 0.2)';
                    elements.syncStatus.style.color = '#06D6A0';
                    isConnected = true;
                } else {
                    elements.syncStatus.innerHTML = '<i class="fas fa-times-circle"></i><span>Backend Unavailable</span>';
                    elements.syncStatus.style.background = 'rgba(255, 107, 107, 0.2)';
                    elements.syncStatus.style.color = '#FF6B6B';
                    isConnected = false;
                }
            }
            
            function formatDate(dateString) {
                try {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                } catch (error) {
                    return 'Recent';
                }
            }
            
            function resetView() {
                elements.scannerContainer.style.display = 'block';
                elements.manualInput.style.display = 'block';
                elements.pageHeader.style.display = 'block';
                elements.cardDisplay.classList.remove('active');
                elements.emptyState.style.display = 'block';
                elements.confirmationModal.classList.remove('active');
                currentCardData = null;
                const video = document.querySelector('.card-video');
                if (video) video.pause();
                const audio = document.querySelector('.card-audio');
                if (audio) audio.pause();
                if (!isScannerActive) {
                    elements.startScanner.disabled = false;
                }
            }
            
            function hideAllExceptCard() {
                elements.scannerContainer.style.display = 'none';
                elements.manualInput.style.display = 'none';
                elements.pageHeader.style.display = 'none';
                elements.emptyState.style.display = 'none';
            }
            
            function renderCardContent(card) {
                elements.displayCardId.textContent = card.card_id;
                elements.displayCardType.textContent = card.message_type;
                elements.displayCardDate.textContent = formatDate(card.created_at);
                elements.cardContent.innerHTML = '';
                switch(card.message_type) {
                    case 'text':
                        elements.cardContent.innerHTML = `
                            <div class="text-message">
                                ${card.message_text || 'No message available'}
                            </div>
                        `;
                        break;
                    case 'image':
                        if (card.media_url) {
                            elements.cardContent.innerHTML = `
                                <div class="media-container">
                                    <img src="${card.media_url}" alt="Card Image" class="card-image">
                                </div>
                            `;
                        } else {
                            elements.cardContent.innerHTML = `<div class="text-message">No image available</div>`;
                        }
                        break;
                    case 'video':
                        if (card.media_url) {
                            elements.cardContent.innerHTML = `
                                <div class="media-container">
                                    <video controls autoplay playsinline class="card-video">
                                        <source src="${card.media_url}" type="video/mp4">
                                    </video>
                                </div>
                            `;
                        } else {
                            elements.cardContent.innerHTML = `<div class="text-message">No video available</div>`;
                        }
                        break;
                    case 'audio':
                        if (card.media_url) {
                            elements.cardContent.innerHTML = `
                                <div class="media-container">
                                    <audio controls autoplay class="card-audio">
                                        <source src="${card.media_url}" type="audio/mpeg">
                                    </audio>
                                </div>
                            `;
                        } else {
                            elements.cardContent.innerHTML = `<div class="text-message">No audio available</div>`;
                        }
                        break;
                }
                elements.cardDisplay.classList.add('active');
                hideAllExceptCard();
                hideError();
            }
            
            function showEcardView(card) {
                console.log('📧 Loading E-Card:', card.card_id);
                const existingBadge = document.querySelector('.card-type-badge');
                if (existingBadge) existingBadge.remove();
                const badge = document.createElement('div');
                badge.className = 'card-type-badge';
                badge.innerHTML = '<i class="fas fa-mobile-alt"></i> Digital E-Card (Instant View)';
                badge.style.cssText = 'text-align: center; margin-bottom: 20px;';
                elements.cardContent.insertAdjacentElement('beforebegin', badge);
                renderCardContent(card);
                incrementScanCount(card.card_id);
                trackEcardOpened(card.card_id);
            }
            
            function showPhysicalCardView(card) {
                console.log('🎴 Loading Physical Card:', card.card_id);
                if (card.physical_card_status === 'dormant' || (card.status === 'pending' && card.card_type === 'physical')) {
                    showDormantPhysicalCardMessage(card);
                    return;
                }
                currentCardData = card;
                elements.confirmationModal.classList.add('active');
            }
            
            function showDormantPhysicalCardMessage(card) {
                const contentDiv = elements.cardContent;
                contentDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; max-width: 600px; margin: 0 auto;">
                        <div style="font-size: 64px; margin-bottom: 20px;">🎴</div>
                        <h2 style="color: #fff; margin-bottom: 15px;">Physical Card Reserved</h2>
                        <p style="color: #a0aec0; line-height: 1.6; margin-bottom: 25px;">
                            This physical card code exists but hasn't been manufactured yet. 
                            The physical card will be available in a future update.
                        </p>
                        <div style="background: rgba(6, 214, 160, 0.1); border: 1px solid #06D6A0; border-radius: 10px; padding: 20px; margin-bottom: 25px;">
                            <p style="color: #06D6A0; margin: 0; font-weight: bold;">Card ID: ${card.card_id}</p>
                            <p style="color: #a0aec0; margin: 5px 0 0 0; font-size: 0.9rem;">Status: Dormant</p>
                        </div>
                        <p style="color: #666; font-size: 0.85rem;">
                            Want a digital card instead? Ask the sender to create an E-Card.
                        </p>
                    </div>
                `;
                elements.displayCardId.textContent = card.card_id;
                elements.displayCardType.textContent = card.message_type;
                elements.displayCardDate.textContent = formatDate(card.created_at);
                elements.cardDisplay.classList.add('active');
                hideAllExceptCard();
            }
            
            async function trackEcardOpened(cardId) {
                try {
                    await fetch(`${BACKEND_URL}/api/cards/${cardId}/track`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            event: 'ecard_opened',
                            timestamp: new Date().toISOString(),
                            user_agent: navigator.userAgent
                        })
                    });
                } catch (e) {
                    console.log('Tracking error (non-critical):', e);
                }
            }
            
            // ========== MODIFIED loadCard (handles draft) ==========
            async function loadCard(cardId) {
                try {
                    console.log(`Loading card from backend: ${cardId}`);
                    hideAllExceptCard();
                    elements.cardContent.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div class="loading" style="margin: 0 auto;"></div>
                            <p style="color: #666; margin-top: 15px;">Loading card...</p>
                        </div>
                    `;
                    elements.cardDisplay.classList.add('active');
                    hideError();
                    
                    const response = await fetch(`${BACKEND_URL}/api/cards/${cardId}`);
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.card) {
                            const card = result.card;
                            console.log('Card loaded successfully:', card);
                            
                            if (card.status === 'draft') {
                                elements.cardContent.innerHTML = `
                                    <div style="text-align: center; padding: 40px;">
                                        <i class="fas fa-lock" style="font-size: 3rem; color: #f39c12; margin-bottom: 20px;"></i>
                                        <h2 style="color: #fff; margin-bottom: 15px;">Card Not Yet Activated</h2>
                                        <p style="color: #a0aec0; line-height: 1.6; margin-bottom: 20px;">
                                            This card is waiting for payment. Please ask the sender to complete checkout.
                                        </p>
                                        <div style="background: rgba(243, 156, 18, 0.1); border-left: 4px solid #f39c12; padding: 15px; border-radius: 8px;">
                                            <p style="color: #f39c12; margin: 0;">💡 The sender will receive a link to complete payment after they design the card.</p>
                                        </div>
                                    </div>
                                `;
                                const existingBadge = document.querySelector('.card-type-badge');
                                if (existingBadge) existingBadge.remove();
                                elements.displayCardId.textContent = card.card_id;
                                elements.displayCardType.textContent = 'Draft';
                                elements.displayCardDate.textContent = formatDate(card.created_at);
                                elements.cardDisplay.classList.add('active');
                                hideAllExceptCard();
                                return;
                            }
                            
                            if (card.card_type === 'ecard' || !card.card_type) {
                                showEcardView(card);
                            } else {
                                showPhysicalCardView(card);
                            }
                            return { success: true, card: card };
                        } else {
                            throw new Error(result.error || 'Card not found');
                        }
                    } else if (response.status === 403) {
                        const errorData = await response.json();
                        elements.cardContent.innerHTML = `
                            <div style="text-align: center; padding: 40px;">
                                <i class="fas fa-lock" style="font-size: 3rem; color: #f39c12; margin-bottom: 20px;"></i>
                                <h2 style="color: #fff; margin-bottom: 15px;">${errorData.message || 'Card Not Yet Activated'}</h2>
                                <p style="color: #a0aec0; line-height: 1.6;">
                                    ${errorData.error || 'Please complete payment to view this card.'}
                                </p>
                            </div>
                        `;
                        elements.cardDisplay.classList.add('active');
                        hideAllExceptCard();
                        return;
                    } else {
                        throw new Error(`Server returned ${response.status}`);
                    }
                } catch (error) {
                    console.error('Error loading card:', error);
                    elements.cardDisplay.classList.remove('active');
                    resetView();
                    showError(`Error: ${error.message}`);
                    return { success: false, error: error.message };
                }
            }
            
            // ===== ALL OTHER ORIGINAL FUNCTIONS (unchanged) =====
            // (confirmation modal handlers, scanner, etc.)
            function handleViewingConfirmation() {
                if (!currentCardData) return;
                elements.confirmationModal.classList.remove('active');
                renderCardContent(currentCardData);
                incrementScanCount(currentCardData.card_id);
            }
            
            elements.confirmViewingBtn.addEventListener('click', handleViewingConfirmation);
            elements.cancelViewingBtn.addEventListener('click', function() {
                elements.confirmationModal.classList.remove('active');
                currentCardData = null;
                resetView();
                showNotification('Viewing cancelled', 'info');
            });
            
            function initScanner() {
                try {
                    html5QrCode = new Html5Qrcode("reader");
                    const config = {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                        rememberLastUsedCamera: true,
                        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                    };
                    async function startScanner() {
                        try {
                            const cameras = await Html5Qrcode.getCameras();
                            if (cameras && cameras.length > 0) {
                                let cameraId = cameras.find(camera => 
                                    camera.label.toLowerCase().includes('back') || 
                                    camera.label.toLowerCase().includes('rear') || 
                                    camera.label.toLowerCase().includes('environment')
                                )?.id;
                                if (!cameraId) cameraId = cameras[0].id;
                                await html5QrCode.start(cameraId, config, onScanSuccess, onScanFailure);
                                isScannerActive = true;
                                elements.startScanner.disabled = true;
                                elements.stopScanner.disabled = false;
                                showNotification('Camera started successfully', 'success');
                            } else {
                                throw new Error('No cameras found');
                            }
                        } catch (error) {
                            console.error('Camera error:', error);
                            showNotification(`Camera error: ${error.message}`, 'error');
                        }
                    }
                    function stopScanner() {
                        if (html5QrCode && isScannerActive) {
                            html5QrCode.stop().then(() => {
                                isScannerActive = false;
                                elements.startScanner.disabled = false;
                                elements.stopScanner.disabled = true;
                                showNotification('Camera stopped', 'info');
                            }).catch(err => console.error('Error stopping scanner:', err));
                        }
                    }
                    function onScanSuccess(decodedText, decodedResult) {
                        console.log(`QR Code scanned: ${decodedText}`);
                        let cardId = decodedText;
                        try {
                            if (decodedText.includes('papir.ca') || decodedText.includes('http')) {
                                const url = new URL(decodedText);
                                const cardParam = url.searchParams.get('card');
                                if (cardParam) cardId = cardParam;
                            }
                        } catch (error) { /* not a URL */ }
                        cardId = cardId.replace(/[^a-zA-Z0-9]/g, '');
                        console.log('Extracted card ID:', cardId);
                        if (html5QrCode && isScannerActive) {
                            html5QrCode.stop().then(() => {
                                isScannerActive = false;
                                elements.startScanner.disabled = false;
                                elements.stopScanner.disabled = true;
                                setTimeout(() => { if (cardId) loadCard(cardId); else showNotification('Invalid QR code', 'error'); }, 100);
                            }).catch(err => {
                                console.error('Error stopping scanner:', err);
                                if (cardId) loadCard(cardId);
                            });
                        } else {
                            if (cardId) loadCard(cardId);
                        }
                    }
                    function onScanFailure(error) { /* silent */ }
                    elements.startScanner.addEventListener('click', startScanner);
                    elements.stopScanner.addEventListener('click', stopScanner);
                } catch (error) {
                    console.error('Scanner initialization error:', error);
                    showNotification('QR scanner initialization failed', 'error');
                }
            }
            
            async function checkBackendConnection() {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/health`);
                    if (response.ok) {
                        updateSyncStatus(true);
                        return true;
                    }
                } catch (error) {
                    console.log('Backend not available:', error.message);
                }
                updateSyncStatus(false);
                return false;
            }
            
            function checkUrlForCard() {
                const urlParams = new URLSearchParams(window.location.search);
                const cardParam = urlParams.get('card');
                if (cardParam) {
                    console.log('Found card in URL:', cardParam);
                    elements.cardIdInput.value = cardParam;
                    setTimeout(() => loadCard(cardParam), 100);
                }
            }
            
            async function initApp() {
                console.log('Initializing Papir Viewer...');
                await checkBackendConnection();
                initScanner();
                checkUrlForCard();
                elements.loadCardBtn.addEventListener('click', function() {
                    const cardId = elements.cardIdInput.value.trim();
                    if (cardId) loadCard(cardId);
                    else showError('Please enter a Card ID');
                });
                elements.cardIdInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const cardId = elements.cardIdInput.value.trim();
                        if (cardId) loadCard(cardId);
                    }
                });
                elements.closeCardBtn.addEventListener('click', resetView);
                console.log('Papir Viewer initialized successfully');
            }
            
            initApp();
        });
    </script>
    
    <footer style="text-align: center; padding: 20px; color: #aaa; border-top: 1px solid #444; margin-top: 40px;">

    </footer>
</body>
</html>
