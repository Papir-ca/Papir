                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <button class="btn-use" data-template-id="${template.id}">
                            <i class="fas fa-magic"></i> Personalize This Design
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.querySelectorAll('.btn-use').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const templateId = this.getAttribute('data-template-id');
                    selectTemplate(templateId);
                });
            });
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            localStorage.setItem('selectedTemplateConfig', JSON.stringify(template));
            window.location.href = 'customize.html?template=' + templateId;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });



        // Initial render
        renderTemplates();
    </script>
    
    <!-- ===== UNIVERSAL MOBILE HELPERS ===== -->
    <script>
        (function() {
            // Prevent double-tap zoom on buttons
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Handle iOS Safari 100vh issue
            function setMobileHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', setMobileHeight);
            window.addEventListener('orientationchange', setMobileHeight);
            setMobileHeight();

            // Detect keyboard open on mobile
            const originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                if (window.innerHeight < originalHeight * 0.75) {
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
            });
        })();
    </script>
</body>
</html>
