<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Template | Papir E-Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            color: #f0f0f0;
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .template-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .template-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .template-preview {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Template-specific preview backgrounds */
        .preview-wedding-lace {
            background: linear-gradient(135deg, #FFF9F0 0%, #F5E6D3 100%);
            position: relative;
        }
        .preview-wedding-lace::after {
            content: "♡";
            font-size: 60px;
            color: #D4AF37;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
        }
        
        .preview-wedding-geometric {
            background: linear-gradient(45deg, #FFFFFF 25%, #F5F5F5 25%, #F5F5F5 50%, #FFFFFF 50%, #FFFFFF 75%, #F5F5F5 75%);
            background-size: 20px 20px;
        }
        
        .preview-wedding-botanical {
            background: linear-gradient(135deg, #F5F0E6 0%, #E8DCCC 100%);
            position: relative;
        }
        .preview-wedding-botanical::after {
            content: "🌿";
            font-size: 50px;
            color: #7C9D8E;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.4;
        }
        
        .preview-romantic {
            background: linear-gradient(135deg, #FCE4EC 0%, #F8BBD9 100%);
            position: relative;
        }
        .preview-romantic::after {
            content: "❤️";
            font-size: 50px;
            color: #880E4F;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
        }
        
        .preview-modern {
            background: linear-gradient(135deg, #F5F5F5 0%, #E0E0E0 100%);
            position: relative;
        }
        .preview-modern::after {
            content: "◆";
            font-size: 60px;
            color: #333;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
        }
        
        .template-info {
            padding: 20px;
        }
        
        .template-category {
            font-size: 0.9rem;
            color: #764ba2;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .template-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .template-description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .template-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #06D6A0;
            margin-bottom: 15px;
        }
        
        .customize-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .customize-btn:hover {
            opacity: 0.9;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* CSP‑safe button styles */
        .use-template-btn, .preview-btn {
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .template-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>
    
    <div class="container">
        <header>
            <h1>✨ Choose Your Template</h1>
            <p class="subtitle">Select a beautiful design to personalize for your special occasion</p>
        </header>
        
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="wedding">Wedding</button>
            <button class="filter-btn" data-filter="save-the-date">Save the Date</button>
            <button class="filter-btn" data-filter="birthday">Birthday</button>
            <button class="filter-btn" data-filter="anniversary">Anniversary</button>
        </div>
        
        <div class="template-grid" id="templateGrid">
            <!-- Templates will be loaded here via JavaScript -->
            <div class="loading">Loading templates...</div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://elmhkhvryjzljxskbfps.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsbWhraHZyeWp6bGp4c2tiZnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NDc3NjMsImV4cCI6MjA4NDAyMzc2M30.Orrh2Pejnt3KPJMTUTmRRkhCwtZVfjUreKvX546bOcw';
        
        // Global state
        let templates = [];
        let currentFilter = 'all';
        let currentFlow = 'single'; // 'single' or 'batch'
        
        async function loadTemplates() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/templates?select=*&is_active=eq.true`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                templates = await response.json();
                renderTemplates();
            } catch (error) {
                console.error('Error loading templates:', error);
                document.getElementById('templateGrid').innerHTML = '<p>Error loading templates</p>';
            }
        }
        
        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            if (!templates.length) {
                grid.innerHTML = '<p>No templates available</p>';
                return;
            }
            
            // Filter templates
            let filtered = currentFilter === 'all' 
                ? templates 
                : templates.filter(t => t.category === currentFilter);
            
            if (currentFlow === 'batch') {
                filtered = filtered.filter(t => t.supportsBatch);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p>No templates match your selection.</p>';
                return;
            }
            
            grid.innerHTML = '';
            
            filtered.forEach(template => {
                const previewClass = getPreviewClass(template.css_class);
                const isBatch = currentFlow === 'batch';
                const badgeHtml = `
                    ${template.popular ? '<span class="badge badge-popular">Popular</span>' : ''}
                    ${template.isNew ? '<span class="badge badge-new">New</span>' : ''}
                    ${isBatch && template.supportsBatch ? '<span class="badge badge-batch">Batch Ready</span>' : ''}
                `;
                
                const card = document.createElement('div');
                card.className = 'template-card';
                card.dataset.templateId = template.id;
                card.innerHTML = `
                    <div class="badges">${badgeHtml}</div>
                    <div class="template-preview ${previewClass}"></div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.category_display || template.category}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <h3 class="template-name">${template.name}</h3>
                        <p class="template-description">${template.description || 'Elegant design for your special occasion'}</p>
                        <div class="action-buttons">
                            <button class="customize-btn use-template-btn" data-template-id="${template.id}" data-is-batch="${isBatch}">
                                <i class="fas fa-${isBatch ? 'layer-group' : 'paint-brush'}"></i> 
                                ${isBatch ? 'Use for Batch' : 'Customize & Send'}
                            </button>
                            ${isBatch ? `
                            <button class="customize-btn preview-btn" data-template-id="${template.id}" style="margin-top: 8px; background: linear-gradient(to right, #06D6A0, #118AB2);">
                                <i class="fas fa-eye"></i> Preview
                            </button>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            // Attach CSP‑safe event listeners
            document.querySelectorAll('.use-template-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const templateId = this.dataset.templateId;
                    const isBatch = this.dataset.isBatch === 'true';
                    selectTemplate(templateId, isBatch);
                });
            });
            
            document.querySelectorAll('.preview-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const templateId = this.dataset.templateId;
                    selectTemplate(templateId, false); // preview = single mode
                });
            });
        }
        
        function getPreviewClass(cssClass) {
            const classMap = {
                'wedding-lace': 'preview-wedding-lace',
                'wedding-geometric': 'preview-wedding-geometric',
                'wedding-botanical': 'preview-wedding-botanical',
                'save-date-romantic': 'preview-romantic',
                'save-date-modern': 'preview-modern'
            };
            return classMap[cssClass] || 'preview-modern';
        }
        
        function selectTemplate(templateId, isBatch) {
            const url = isBatch 
                ? `/customize.html?template=${templateId}&mode=batch&batch_id=BATCH_${Date.now()}`
                : `/customize.html?template=${templateId}`;
            window.location.href = url;
        }
        
        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });
        
        // Detect flow from URL? (optional, can be removed)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'batch') {
            currentFlow = 'batch';
        }
        
        loadTemplates();
    </script>
</body>
</html>
