        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --gold: #BCAE83; --teal: #06D6A0; --dark: #1a1a2e; --darker: #16213e; --light-text: #a0aec0; --white: #ffffff; }
        body { background: #faf9f7; min-height: 100vh; color: var(--dark); }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 3rem; margin-bottom: 15px; color: var(--dark); font-weight: 700; }
        h1 span { color: var(--gold); }
        .subtitle { font-size: 1.2rem; color: #4a5568; }

        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 2px solid #e2e8f0; background: transparent; color: var(--dark); border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--gold); color: var(--white); border-color: var(--gold); }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .template-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .template-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .preview-container { height: 220px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }

        let currentFilter = 'all';


        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';

            let filtered = currentFilter === 'all'
                ? templates
                : templates.filter(t => t.category === currentFilter);

            filtered.forEach(template => {
                const card = document.createElement('div');
                card.className = 'template-card';

                const badges = [];
                if (template.popular) badges.push('<span class="badge badge-popular">Popular</span>');
                if (template.isNew) badges.push('<span class="badge badge-new">New</span>');

                const previewClass = `preview-${template.id}`;
                const sample = template.config.sampleText;

                card.innerHTML = `
                    ${badges.join('')}
                    <div class="preview-container ${previewClass}">
                        <div class="main-text">${sample.names || sample.header}</div>
                        ${sample.subtext ? `<div class="sub-text">${sample.subtext.substring(0, 40)}${sample.subtext.length > 40 ? '...' : ''}</div>` : ''}
                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <button class="btn-use" data-template-id="${template.id}">
                            <i class="fas fa-magic"></i> Personalize This Design
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.querySelectorAll('.btn-use').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const templateId = this.getAttribute('data-template-id');
                    selectTemplate(templateId);
                });
            });
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            localStorage.setItem('selectedTemplateConfig', JSON.stringify(template));
            window.location.href = 'customize.html?template=' + templateId;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });



        // Initial render
        renderTemplates();
    </script>

    <!-- ===== UNIVERSAL MOBILE HELPERS ===== -->
    <script>
        (function() {
            // Prevent double-tap zoom on buttons
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Handle iOS Safari 100vh issue
            function setMobileHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', setMobileHeight);
            window.addEventListener('orientationchange', setMobileHeight);
            setMobileHeight();

            // Detect keyboard open on mobile
            const originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                if (window.innerHeight < originalHeight * 0.75) {
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
            });
        })();
    </script>
