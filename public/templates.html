        let currentFilter = 'all';
        let isBatchMode = false;

        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';

            let filtered = currentFilter === 'all' 
                ? templates 
                : templates.filter(t => t.category === currentFilter);

            filtered.forEach(template => {
                const card = document.createElement('div');
                card.className = 'template-card';

                const badges = [];
                if (template.popular) badges.push('<span class="badge badge-popular">Popular</span>');
                if (template.isNew) badges.push('<span class="badge badge-new">New</span>');

                const previewClass = `preview-${template.id}`;
                const sample = template.config.sampleText;

                card.innerHTML = `
                    ${badges.join('')}
                    <div class="preview-container ${previewClass}">
                        <div class="main-text">${sample.names || sample.header}</div>
                        ${sample.subtext ? `<div class="sub-text">${sample.subtext.substring(0, 40)}${sample.subtext.length > 40 ? '...' : ''}</div>` : ''}
                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <button class="btn-use" data-template-id="${template.id}">
                            <i class="fas fa-magic"></i> Personalize This Design
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.querySelectorAll('.btn-use').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const templateId = this.getAttribute('data-template-id');
                    selectTemplate(templateId);
                });
            });
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            // Save template config with mode information
            const config = {
                ...template,
                isBatchMode: isBatchMode,
                batchSize: isBatchMode ? 10 : 1,
                mode: isBatchMode ? 'batch' : 'single'
            };
            localStorage.setItem('selectedTemplateConfig', JSON.stringify(config));

            // Build URL with mode and quantity parameters
            const params = new URLSearchParams({
                template: templateId,
                mode: isBatchMode ? 'batch' : 'single',
                qty: isBatchMode ? '10' : '1'
            });

            window.location.href = 'customize.html?' + params.toString();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });

        // Mode toggle buttons
        const singleBtn = document.getElementById('singleModeBtn');
        const batchBtn = document.getElementById('batchModeBtn');

        singleBtn.addEventListener('click', () => {
            isBatchMode = false;
            singleBtn.classList.add('active');
            batchBtn.classList.remove('active');
        });

        batchBtn.addEventListener('click', () => {
            isBatchMode = true;
            batchBtn.classList.add('active');
            singleBtn.classList.remove('active');
        });

        // Initial render
        renderTemplates();
    </script>
    
    <!-- ===== UNIVERSAL MOBILE HELPERS ===== -->
    <script>
        (function() {
            // Prevent double-tap zoom on buttons
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Handle iOS Safari 100vh issue
            function setMobileHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', setMobileHeight);
            window.addEventListener('orientationchange', setMobileHeight);
            setMobileHeight();

            // Detect keyboard open on mobile
            const originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                if (window.innerHeight < originalHeight * 0.75) {
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
            });
        })();
    </script>
