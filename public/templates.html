<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Design | Papir E-Cards</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            color: #f0f0f0;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 50px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px 25px;
            border: none;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: white;
            color: #764ba2;
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .template-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .preview-container {
            height: 200px;
            position: relative;
            overflow: hidden;
        }
        
        /* Wedding */
        .preview-wedding-elegant {
            background: linear-gradient(135deg, #FFF9F0 0%, #F5E6D3 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-wedding-elegant h3 {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 1.5rem;
        }
        .preview-wedding-elegant p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .preview-wedding-modern {
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-wedding-modern h3 {
            color: #2C3E50;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        
        .preview-wedding-floral {
            background: linear-gradient(135deg, #F5F0E6 0%, #E8E0D5 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-wedding-floral h3 {
            font-family: 'Parisienne', cursive;
            color: #5D7B6F;
            font-size: 1.8rem;
        }
        
        /* Birthday */
        .preview-birthday-fun {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFD166 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-birthday-fun h3 {
            font-family: 'Pacifico', cursive;
            color: white;
            font-size: 1.8rem;
        }
        
        .preview-birthday-elegant {
            background: #2C3E50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-birthday-elegant h3 {
            color: #F39C12;
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
        }
        
        .preview-birthday-kids {
            background: linear-gradient(135deg, #06D6A0 0%, #118AB2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-birthday-kids h3 {
            color: white;
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.4rem;
        }
        
        /* Save the Date */
        .preview-savethedate-romantic {
            background: linear-gradient(135deg, #FCE4EC 0%, #F8BBD9 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-savethedate-romantic h3 {
            font-family: 'Great Vibes', cursive;
            color: #880E4F;
            font-size: 1.8rem;
        }
        
        .preview-savethedate-minimal {
            background: #FFFFFF;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-savethedate-minimal h3 {
            color: #000;
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
        }
        
        /* Thank You */
        .preview-thankyou-classic {
            background: #FDFBF7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-thankyou-classic h3 {
            font-family: 'Alex Brush', cursive;
            color: #8B7355;
            font-size: 1.8rem;
        }
        
        /* Anniversary */
        .preview-anniversary-gold {
            background: #1A1A2E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .preview-anniversary-gold h3 {
            color: #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
        }
        
        .template-info {
            padding: 20px;
        }
        
        .template-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .template-category {
            font-size: 0.8rem;
            color: #764ba2;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .template-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #06D6A0;
        }
        
        .template-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .template-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .btn-use {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-use:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .badge-popular {
            background: #FF6B6B;
            color: white;
        }
        
        .badge-new {
            background: #06D6A0;
            color: #1a1a2e;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back
    </a>
    
    <div class="container">
        <header>
            <h1>🎨 Choose Your Design</h1>
            <p class="subtitle">Select a style, personalize it, and send instantly</p>
        </header>
        
        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="singleModeBtn">
                <i class="fas fa-heart"></i> Single Card ($2.99)
            </button>
            <button class="mode-btn" id="batchModeBtn">
                <i class="fas fa-layer-group"></i> Batch (2-500)
            </button>
        </div>
        
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="wedding">Wedding</button>
            <button class="filter-btn" data-filter="birthday">Birthday</button>
            <button class="filter-btn" data-filter="savethedate">Save the Date</button>
            <button class="filter-btn" data-filter="thankyou">Thank You</button>
            <button class="filter-btn" data-filter="anniversary">Anniversary</button>
        </div>
        
        <div class="template-grid" id="templateGrid">
            <!-- Templates loaded here -->
        </div>
    </div>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&family=Parisienne&family=Pacifico&family=Cinzel:wght@400;700&family=Great+Vibes&family=Alex+Brush&display=swap" rel="stylesheet">
    
    <script>
        const templates = [
            {
                id: 'wedding-elegant',
                category: 'wedding',
                categoryDisplay: 'Wedding',
                name: 'Classic Gold',
                description: 'Timeless gold accents with serif elegance for traditional celebrations.',
                price: 299,
                popular: true,
                previewClass: 'preview-wedding-elegant',
                config: {
                    backgroundColor: '#FFF9F0',
                    borderColor: '#D4AF37',
                    borderWidth: 3,
                    borderStyle: 'double',
                    defaultFont: 'Playfair Display',
                    textColor: '#2C3E50',
                    accentColor: '#D4AF37',
                    sampleText: {
                        header: 'Together with their families',
                        names: 'Alexandra & Michael',
                        subtext: 'request the pleasure of your company',
                        date: 'June 15, 2026'
                    }
                }
            },
            {
                id: 'wedding-modern',
                category: 'wedding',
                categoryDisplay: 'Wedding',
                name: 'Modern Minimal',
                description: 'Clean lines and contemporary sans-serif fonts.',
                price: 299,
                previewClass: 'preview-wedding-modern',
                config: {
                    backgroundColor: '#FFFFFF',
                    borderColor: 'transparent',
                    borderWidth: 0,
                    defaultFont: 'Montserrat',
                    textColor: '#2C3E50',
                    accentColor: '#E74C3C',
                    sampleText: {
                        header: 'WE INVITE YOU',
                        names: 'JESSICA + DAVID',
                        subtext: 'are getting married',
                        date: 'SEPTEMBER 12, 2026'
                    }
                }
            },
            {
                id: 'wedding-floral',
                category: 'wedding',
                categoryDisplay: 'Wedding',
                name: 'Botanical Garden',
                description: 'Soft sage greens with elegant script accents.',
                price: 299,
                isNew: true,
                previewClass: 'preview-wedding-floral',
                config: {
                    backgroundColor: '#F5F0E6',
                    borderColor: '#7C9D8E',
                    borderWidth: 2,
                    defaultFont: 'Parisienne',
                    textColor: '#5D7B6F',
                    accentColor: '#7C9D8E',
                    sampleText: {
                        header: 'love is blooming',
                        names: 'Emma & Oliver',
                        subtext: 'request the pleasure of your company',
                        date: 'May 20, 2026'
                    }
                }
            },
            {
                id: 'birthday-fun',
                category: 'birthday',
                categoryDisplay: 'Birthday',
                name: 'Party Time',
                description: 'Bright colors and playful vibes for any age.',
                price: 299,
                popular: true,
                previewClass: 'preview-birthday-fun',
                config: {
                    backgroundColor: '#FF6B6B',
                    gradient: 'linear-gradient(135deg, #FF6B6B 0%, #FFD166 100%)',
                    borderWidth: 0,
                    defaultFont: 'Pacifico',
                    textColor: '#FFFFFF',
                    accentColor: '#FFD166',
                    sampleText: {
                        header: 'Let\'s Celebrate!',
                        names: 'Happy Birthday',
                        subtext: 'Join us for a party',
                        date: 'Saturday, March 15th'
                    }
                }
            },
            {
                id: 'birthday-elegant',
                category: 'birthday',
                categoryDisplay: 'Birthday',
                name: 'Sophisticated',
                description: 'Milestone birthdays deserve elegance.',
                price: 299,
                previewClass: 'preview-birthday-elegant',
                config: {
                    backgroundColor: '#2C3E50',
                    borderColor: '#F39C12',
                    borderWidth: 2,
                    defaultFont: 'Cinzel',
                    textColor: '#F39C12',
                    accentColor: '#FFF',
                    sampleText: {
                        header: 'CELEBRATING',
                        names: '50 YEARS',
                        subtext: 'You are cordially invited',
                        date: 'November 8, 2026'
                    }
                }
            },
            {
                id: 'birthday-kids',
                category: 'birthday',
                categoryDisplay: 'Birthday',
                name: 'Kids Adventure',
                description: 'Fun and colorful for little ones.',
                price: 299,
                isNew: true,
                previewClass: 'preview-birthday-kids',
                config: {
                    backgroundColor: '#06D6A0',
                    gradient: 'linear-gradient(135deg, #06D6A0 0%, #118AB2 100%)',
                    borderWidth: 0,
                    defaultFont: 'Comic Sans MS',
                    textColor: '#FFFFFF',
                    accentColor: '#FFD166',
                    sampleText: {
                        header: 'Calling All Superheroes!',
                        names: 'Tyler is Turning 5!',
                        subtext: 'Cake, games & fun!',
                        date: 'April 22, 2026'
                    }
                }
            },
            {
                id: 'savethedate-romantic',
                category: 'savethedate',
                categoryDisplay: 'Save the Date',
                name: 'Romantic Script',
                description: 'Soft pink tones with flowing script.',
                price: 299,
                popular: true,
                previewClass: 'preview-savethedate-romantic',
                config: {
                    backgroundColor: '#FCE4EC',
                    borderColor: '#F48FB1',
                    borderWidth: 1,
                    defaultFont: 'Great Vibes',
                    textColor: '#880E4F',
                    accentColor: '#AD1457',
                    sampleText: {
                        header: 'Save the Date',
                        names: 'Sarah & James',
                        subtext: 'are tying the knot',
                        date: 'August 14, 2026'
                    }
                }
            },
            {
                id: 'savethedate-minimal',
                category: 'savethedate',
                categoryDisplay: 'Save the Date',
                name: 'Minimal Black',
                description: 'Bold and modern for contemporary couples.',
                price: 299,
                previewClass: 'preview-savethedate-minimal',
                config: {
                    backgroundColor: '#FFFFFF',
                    borderColor: '#000000',
                    borderWidth: 3,
                    defaultFont: 'Helvetica Neue',
                    textColor: '#000000',
                    accentColor: '#666666',
                    sampleText: {
                        header: 'SAVE THE DATE',
                        names: 'MIA & ETHAN',
                        subtext: 'more details coming soon',
                        date: '10.24.2026'
                    }
                }
            },
            {
                id: 'thankyou-classic',
                category: 'thankyou',
                categoryDisplay: 'Thank You',
                name: 'Classic Script',
                description: 'Elegant handwritten style gratitude.',
                price: 299,
                previewClass: 'preview-thankyou-classic',
                config: {
                    backgroundColor: '#FDFBF7',
                    borderColor: '#D4AF37',
                    borderWidth: 1,
                    defaultFont: 'Alex Brush',
                    textColor: '#8B7355',
                    accentColor: '#5D4E37',
                    sampleText: {
                        header: 'Thank You',
                        names: 'from the bottom of our hearts',
                        subtext: 'Your generosity means the world',
                        date: 'With gratitude, The Johnsons'
                    }
                }
            },
            {
                id: 'anniversary-gold',
                category: 'anniversary',
                categoryDisplay: 'Anniversary',
                name: 'Golden Years',
                description: 'Celebrate decades of love in style.',
                price: 299,
                previewClass: 'preview-anniversary-gold',
                config: {
                    backgroundColor: '#1A1A2E',
                    borderColor: '#D4AF37',
                    borderWidth: 2,
                    defaultFont: 'Cinzel',
                    textColor: '#D4AF37',
                    accentColor: '#FFFFFF',
                    sampleText: {
                        header: 'Celebrating',
                        names: '25 Years',
                        subtext: 'of love & laughter',
                        date: 'June 15, 2026'
                    }
                }
            }
        ];

        let currentFilter = 'all';
        let isBatchMode = false;

        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';

            let filtered = currentFilter === 'all' 
                ? templates 
                : templates.filter(t => t.category === currentFilter);

            filtered.forEach(template => {
                const card = document.createElement('div');
                card.className = 'template-card';
                
                const badges = [];
                if (template.popular) badges.push('<span class="badge badge-popular">Popular</span>');
                if (template.isNew) badges.push('<span class="badge badge-new">New</span>');
                
                card.innerHTML = `
                    ${badges.join('')}
                    <div class="preview-container ${template.previewClass}">
                        <h3>${template.config.sampleText.names}</h3>
                        <p>${template.config.sampleText.date}</p>
                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <button class="btn-use" data-template-id="${template.id}">
                            <i class="fas fa-paint-brush"></i> Use This Design
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            // Add click listeners to all buttons
            document.querySelectorAll('.btn-use').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const templateId = this.getAttribute('data-template-id');
                    selectTemplate(templateId);
                });
            });
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;
            
            console.log('Selecting template:', templateId, 'Batch mode:', isBatchMode);
            
            // Store in localStorage
            localStorage.setItem('selectedTemplateConfig', JSON.stringify({
                ...template,
                isBatchMode: isBatchMode,
                batchSize: isBatchMode ? 10 : 1
            }));
            
            // Build URL
            const params = new URLSearchParams({
                template: templateId,
                mode: isBatchMode ? 'batch' : 'single'
            });
            
            if (isBatchMode) {
                params.append('qty', '10');
            }
            
            // Navigate
            window.location.href = 'customize.html?' + params.toString();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });

        // Mode toggle
        const singleBtn = document.getElementById('singleModeBtn');
        const batchBtn = document.getElementById('batchModeBtn');
        
        singleBtn.addEventListener('click', () => {
            isBatchMode = false;
            singleBtn.classList.add('active');
            batchBtn.classList.remove('active');
        });
        
        batchBtn.addEventListener('click', () => {
            isBatchMode = true;
            batchBtn.classList.add('active');
            singleBtn.classList.remove('active');
        });

        // Initial render
        renderTemplates();
    </script>
</body>
</html>
