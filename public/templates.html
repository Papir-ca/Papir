        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #FFD166, #06D6A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            color: #f0f0f0;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 50px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px 25px;
            border: none;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: white;
            color: #764ba2;
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .template-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .template-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        let currentFilter = 'all';
        let isBatchMode = false;

        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';

            let filtered = currentFilter === 'all' 
                ? templates 
                : templates.filter(t => t.category === currentFilter);

            filtered.forEach(template => {
                const card = document.createElement('div');
                card.className = 'template-card';
                
                const badges = [];
                if (template.popular) badges.push('<span class="badge badge-popular">Popular</span>');
                if (template.isNew) badges.push('<span class="badge badge-new">New</span>');
                
                card.innerHTML = `
                    ${badges.join('')}
                    <div class="preview-container ${template.previewClass}">
                        ${getPreviewContent(template)}
                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <div class="action-buttons">
                            <button class="btn-use" onclick="selectTemplate('${template.id}')">
                                <i class="fas fa-paint-brush"></i> Use This Design
                            </button>
                            <button class="btn-preview" onclick="previewTemplate('${template.id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function getPreviewContent(template) {
            const config = template.config;
            // Basic sample content – you can extend per template if needed
            return `
                <h3>${config.sampleText.names || 'Sample Text'}</h3>
                <p>${config.sampleText.date || ''}</p>
                ${template.previewClass.includes('birthday-fun') ? '<div class="balloons">🎈🎂🎈</div>' : ''}
                ${template.previewClass.includes('birthday-kids') ? '<div class="stars">⭐⭐⭐</div>' : ''}
                ${template.previewClass.includes('anniversary') ? '<div class="years">♡</div>' : ''}
                ${template.previewClass.includes('wedding-modern') ? '<div class="line"></div>' : ''}
            `;
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;
            
            // Store full config in localStorage so customize.html can load it
            localStorage.setItem('selectedTemplateConfig', JSON.stringify({
                ...template,
                isBatchMode: isBatchMode,
                batchSize: isBatchMode ? Math.max(2, parseInt(localStorage.getItem('batchSize') || '10')) : 1
            }));
            
            // Redirect to customize page
            const params = new URLSearchParams({
                template: templateId,
                mode: isBatchMode ? 'batch' : 'single',
                ...(isBatchMode && { qty: localStorage.getItem('batchSize') || '10' })
            });
            
            window.location.href = `customize.html?${params.toString()}`;
        }

        function previewTemplate(templateId) {
            // Optional: open modal with larger preview
            console.log('Previewing template:', templateId);
            // Could also redirect to a preview page: window.location.href = `preview.html?template=${templateId}`;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });

        // Mode toggle
        const singleBtn = document.getElementById('singleModeBtn');
        const batchBtn = document.getElementById('batchModeBtn');
        
        singleBtn.addEventListener('click', () => {
            isBatchMode = false;
            singleBtn.classList.add('active');
            batchBtn.classList.remove('active');
            updatePriceDisplay();
        });
        
        batchBtn.addEventListener('click', () => {
            isBatchMode = true;
            batchBtn.classList.add('active');
            singleBtn.classList.remove('active');
            updatePriceDisplay();
        });

        function updatePriceDisplay() {
            if (isBatchMode) {
                const qty = Math.max(2, parseInt(localStorage.getItem('batchSize') || '10'));
                document.getElementById('batchPricePreview').textContent = `($${(qty * 2.99).toFixed(0)})`;
            } else {
                document.getElementById('batchPricePreview').textContent = '';
            }
        }

        // Initialize
        renderTemplates();
        updatePriceDisplay();
    </script>
