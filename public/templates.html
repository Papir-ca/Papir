        .filter-btn { padding: 10px 20px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: white; border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: white; color: #764ba2; border-color: white; }

        .preview-container { height: 220px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }

        .btn-use { width: 100%; padding: 12px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-use:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }

                const sample = template.config.sampleText;

                card.innerHTML = `
                    ${badges.join('')}
                    <div class="preview-container ${previewClass}">
                        <div class="main-text">${sample.names || sample.header}</div>
                        ${sample.subtext ? `<div class="sub-text">${sample.subtext.substring(0, 40)}${sample.subtext.length > 40 ? '...' : ''}</div>` : ''}
                    </div>
                    <div class="template-info">
                        <div class="template-meta">
                            <span class="template-category">${template.categoryDisplay}</span>
                            <span class="template-price">$${(template.price / 100).toFixed(2)}</span>
                        </div>
                        <div class="template-name">${template.name}</div>
                        <p class="template-description">${template.description}</p>
                        <button class="btn-use" data-template-id="${template.id}">
                            <i class="fas fa-magic"></i> Personalize This Design
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.querySelectorAll('.btn-use').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const templateId = this.getAttribute('data-template-id');
                    selectTemplate(templateId);
                });
            });
        }

        function selectTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            localStorage.setItem('selectedTemplateConfig', JSON.stringify(template));
            window.location.href = 'customize.html?template=' + templateId;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTemplates();
            });
        });



        // Initial render
        renderTemplates();
    </script>
    
    <!-- ===== UNIVERSAL MOBILE HELPERS ===== -->
    <script>
        (function() {
            // Prevent double-tap zoom on buttons
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Handle iOS Safari 100vh issue
            function setMobileHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', setMobileHeight);
            window.addEventListener('orientationchange', setMobileHeight);
            setMobileHeight();

            // Detect keyboard open on mobile
            const originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                if (window.innerHeight < originalHeight * 0.75) {
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
            });
        })();
    </script>
</body>
</html>
