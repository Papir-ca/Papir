<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize Your Card | Papir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #BCAE83;
            --primary-teal: #06D6A0;
            --dark-bg: #1a1a2e;
            --light-bg: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .design-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }

        .template-badge {
            background: var(--primary-gold);
            color: var(--dark-bg);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .mode-switch {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 4px;
        }

        .mode-option {
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
        }

        .mode-option.active {
            background: var(--primary-teal);
            color: #1a1a2e;
        }

        .price-display {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid var(--primary-teal);
        }

        .batch-controls {
            display: none;
            background: rgba(6, 214, 160, 0.1);
            border: 2px solid var(--primary-teal);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .batch-controls.active {
            display: block;
        }

        .design-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            height: calc(100vh - 180px);
        }

        .tools-panel {
            width: 70px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .tool-btn {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover, .tool-btn.active {
            background: var(--primary-gold);
            color: white;
        }

        .canvas-area {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .canvas-toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .canvas-container {
            flex: 1;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #designCanvas {
            border: 2px solid #ddd;
            background: white;
        }

        .properties-panel {
            width: 350px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            color: white;
        }

        .property-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .property-section h4 {
            margin-bottom: 12px;
            color: var(--primary-gold);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .text-input-area {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            resize: vertical;
        }

        .font-selector {
            width: 100%;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }

        .font-selector option {
            background: #2a2a2a;
            color: white;
        }

        .slider-with-value {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .slider-with-value input[type="range"] {
            flex: 1;
        }

        .slider-with-value input[type="number"] {
            width: 60px;
            padding: 5px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            text-align: center;
        }

        .alignment-buttons, .text-effect-buttons {
            display: flex;
            gap: 5px;
        }

        .align-btn, .effect-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .align-btn:hover, .align-btn.active, .effect-btn:hover, .effect-btn.active {
            background: var(--primary-gold);
            color: #1a1a2e;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary-gold);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 2;
            padding: 14px;
            background: linear-gradient(to right, var(--primary-teal), #0ef7b9);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="design-header">
            <div class="header-left">
                <a href="templates.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h1><i class="fas fa-magic"></i> Customize</h1>
                <span class="template-badge" id="templateName">Design</span>
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="mode-switch">
                    <button class="mode-option active" id="singleModeBtn">Single</button>
                    <button class="mode-option" id="batchModeBtn">Batch</button>
                </div>
                <div class="price-display" id="priceDisplay">$2.99</div>
            </div>
        </div>

        <div class="batch-controls" id="batchControls">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <h3 style="color: var(--primary-teal);">Batch Order</h3>
                <div style="text-align: right;">
                    <div style="font-size: 1.5rem; color: var(--primary-teal); font-weight: bold;" id="totalPrice">$29.90</div>
                    <div style="font-size: 0.8rem;">$2.99 per card</div>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span>Quantity:</span>
                <button onclick="updateQty(-1)" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white; cursor: pointer;">-</button>
                <input type="number" id="qtyInput" value="10" min="2" max="500" style="width: 70px; padding: 8px; text-align: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px;">
                <button onclick="updateQty(1)" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white; cursor: pointer;">+</button>
            </div>
        </div>

        <div class="design-layout">
            <div class="tools-panel">
                <button class="tool-btn active" data-tool="select"><i class="fas fa-mouse-pointer"></i></button>
                <button class="tool-btn" data-tool="text"><i class="fas fa-font"></i></button>
                <button class="tool-btn" data-tool="image"><i class="fas fa-image"></i></button>
                <button class="tool-btn" data-tool="shape"><i class="fas fa-shapes"></i></button>
                <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <button class="tool-btn" data-tool="undo"><i class="fas fa-undo"></i></button>
                <button class="tool-btn" data-tool="redo"><i class="fas fa-redo"></i></button>
                <button class="tool-btn" data-tool="delete"><i class="fas fa-trash"></i></button>
            </div>

            <div class="canvas-area">
                <div class="canvas-toolbar">
                    <div>Front of Card</div>
                    <div>
                        <button onclick="zoom(-0.1)" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer;">-</button>
                        <span id="zoomDisplay" style="margin: 0 10px;">100%</span>
                        <button onclick="zoom(0.1)" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer;">+</button>
                    </div>
                </div>
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="designCanvas" width="600" height="450"></canvas>
                </div>
            </div>

            <div class="properties-panel">
                <h3 style="margin-bottom: 20px; color: var(--primary-gold);"><i class="fas fa-sliders-h"></i> Properties</h3>
                
                <div id="textControls">
                    <div class="property-section">
                        <h4>Text Content</h4>
                        <textarea class="text-input-area" id="textContent" placeholder="Enter text..."></textarea>
                    </div>

                    <div class="property-section">
                        <h4>Font</h4>
                        <select class="font-selector" id="fontFamily">
                            <option value="Playfair Display">Playfair Display</option>
                            <option value="Montserrat">Montserrat</option>
                            <option value="Parisienne">Parisienne</option>
                            <option value="Great Vibes">Great Vibes</option>
                            <option value="Pacifico">Pacifico</option>
                            <option value="Cinzel">Cinzel</option>
                            <option value="Alex Brush">Alex Brush</option>
                            <option value="Comic Sans MS">Comic Sans MS</option>
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Georgia</option>
                        </select>
                    </div>

                    <div class="property-section">
                        <h4>Size & Color</h4>
                        <div class="slider-with-value" style="margin-bottom: 10px;">
                            <input type="range" id="fontSize" min="12" max="100" value="32">
                            <input type="number" id="fontSizeNum" min="12" max="100" value="32">
                        </div>
                        <input type="color" id="textColor" value="#333333">
                    </div>

                    <div class="property-section">
                        <h4>Style</h4>
                        <div class="text-effect-buttons">
                            <button class="effect-btn" id="boldBtn"><i class="fas fa-bold"></i></button>
                            <button class="effect-btn" id="italicBtn"><i class="fas fa-italic"></i></button>
                            <button class="effect-btn" id="underlineBtn"><i class="fas fa-underline"></i></button>
                        </div>
                    </div>

                    <div class="property-section">
                        <h4>Alignment</h4>
                        <div class="alignment-buttons">
                            <button class="align-btn" data-align="left"><i class="fas fa-align-left"></i></button>
                            <button class="align-btn" data-align="center"><i class="fas fa-align-center"></i></button>
                            <button class="align-btn" data-align="right"><i class="fas fa-align-right"></i></button>
                        </div>
                    </div>
                </div>

                <div class="property-section">
                    <h4>Add Image</h4>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <div>Click to upload</div>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick="saveAndContinue()">
                        <i class="fas fa-arrow-right"></i> Continue
                    </button>
                    <button class="btn-secondary" onclick="preview()">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Fabric
        const canvas = new fabric.Canvas('designCanvas');
        let selectedObject = null;
        let templateConfig = null;
        let isBatchMode = false;
        let currentZoom = 1;

        // Load template
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const saved = localStorage.getItem('selectedTemplateConfig');
            
            if (saved) {
                templateConfig = JSON.parse(saved);
                document.getElementById('templateName').textContent = templateConfig.name;
                
                if (templateConfig.isBatchMode || urlParams.get('mode') === 'batch') {
                    enableBatchMode();
                }
                
                loadTemplateDesign();
            }
        }

        function loadTemplateDesign() {
            const config = templateConfig.config;
            const container = document.getElementById('canvasContainer');
            
            // Background
            if (config.gradient) {
                container.style.background = config.gradient;
            } else {
                container.style.background = config.backgroundColor || '#f0f0f0';
            }
            
            // Border
            if (config.borderWidth > 0) {
                container.style.border = `${config.borderWidth}px ${config.borderStyle || 'solid'} ${config.borderColor}`;
            }
            
            // Sample text with template font
            const text = new fabric.Text(config.sampleText.names, {
                left: 300,
                top: 225,
                fontSize: 40,
                fontFamily: config.defaultFont,
                fill: config.textColor,
                textAlign: 'center',
                originX: 'center',
                originY: 'center'
            });
            
            canvas.add(text);
            canvas.renderAll();
            
            // Load the font
            const link = document.createElement('link');
            link.href = `https://fonts.googleapis.com/css2?family=${config.defaultFont.replace(' ', '+')}&display=swap`;
            link.rel = 'stylesheet';
            document.head.appendChild(link);
        }

        function enableBatchMode() {
            isBatchMode = true;
            document.getElementById('batchControls').classList.add('active');
            document.getElementById('singleModeBtn').classList.remove('active');
            document.getElementById('batchModeBtn').classList.add('active');
            updatePrice();
        }

        function updateQty(change) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + change;
            if (val < 2) val = 2;
            if (val > 500) val = 500;
            input.value = val;
            updatePrice();
        }

        function updatePrice() {
            const qty = parseInt(document.getElementById('qtyInput').value) || 2;
            document.getElementById('totalPrice').textContent = '$' + (qty * 2.99).toFixed(2);
            document.getElementById('priceDisplay').textContent = '$' + (qty * 2.99).toFixed(2);
        }

        // Mode toggle
        document.getElementById('singleModeBtn').addEventListener('click', function() {
            isBatchMode = false;
            this.classList.add('active');
            document.getElementById('batchModeBtn').classList.remove('active');
            document.getElementById('batchControls').classList.remove('active');
            document.getElementById('priceDisplay').textContent = '$2.99';
        });

        document.getElementById('batchModeBtn').addEventListener('click', function() {
            enableBatchMode();
        });

        document.getElementById('qtyInput').addEventListener('change', updatePrice);

        // Canvas events
        canvas.on('selection:created', (e) => {
            selectedObject = e.selected[0];
            updateControls();
        });

        canvas.on('selection:updated', (e) => {
            selectedObject = e.selected[0];
            updateControls();
        });

        canvas.on('selection:cleared', () => {
            selectedObject = null;
        });

        function updateControls() {
            if (!selectedObject || !selectedObject.type.includes('text')) return;
            
            document.getElementById('textContent').value = selectedObject.text || '';
            document.getElementById('fontFamily').value = selectedObject.fontFamily || 'Arial';
            document.getElementById('fontSize').value = selectedObject.fontSize || 32;
            document.getElementById('fontSizeNum').value = selectedObject.fontSize || 32;
            document.getElementById('textColor').value = selectedObject.fill || '#333333';
            
            document.getElementById('boldBtn').classList.toggle('active', selectedObject.fontWeight === 'bold');
            document.getElementById('italicBtn').classList.toggle('active', selectedObject.fontStyle === 'italic');
            document.getElementById('underlineBtn').classList.toggle('active', selectedObject.underline);
        }

        // Text controls
        document.getElementById('textContent').addEventListener('input', (e) => {
            if (selectedObject && selectedObject.type.includes('text')) {
                selectedObject.set('text', e.target.value);
                canvas.renderAll();
            }
        });

        document.getElementById('fontFamily').addEventListener('change', (e) => {
            if (selectedObject && selectedObject.type.includes('text')) {
                selectedObject.set('fontFamily', e.target.value);
                canvas.renderAll();
            }
        });

        document.getElementById('fontSize').addEventListener('input', (e) => {
            if (selectedObject && selectedObject.type.includes('text')) {
                selectedObject.set('fontSize', parseInt(e.target.value));
                document.getElementById('fontSizeNum').value = e.target.value;
                canvas.renderAll();
            }
        });

        document.getElementById('textColor').addEventListener('input', (e) => {
            if (selectedObject && selectedObject.type.includes('text')) {
                selectedObject.set('fill', e.target.value);
                canvas.renderAll();
            }
        });

        // Style buttons
        document.getElementById('boldBtn').addEventListener('click', function() {
            if (selectedObject && selectedObject.type.includes('text')) {
                const isBold = selectedObject.fontWeight === 'bold';
                selectedObject.set('fontWeight', isBold ? 'normal' : 'bold');
                this.classList.toggle('active', !isBold);
                canvas.renderAll();
            }
        });

        document.getElementById('italicBtn').addEventListener('click', function() {
            if (selectedObject && selectedObject.type.includes('text')) {
                const isItalic = selectedObject.fontStyle === 'italic';
                selectedObject.set('fontStyle', isItalic ? 'normal' : 'italic');
                this.classList.toggle('active', !isItalic);
                canvas.renderAll();
            }
        });

        // Alignment
        document.querySelectorAll('.align-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (selectedObject && selectedObject.type.includes('text')) {
                    document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedObject.set('textAlign', this.dataset.align);
                    canvas.renderAll();
                }
            });
        });

        // Tools
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tool = this.dataset.tool;
                
                if (tool === 'text') {
                    const text = new fabric.Text('New Text', {
                        left: 300,
                        top: 225,
                        fontSize: 32,
                        fontFamily: templateConfig?.config?.defaultFont || 'Arial',
                        fill: '#333333',
                        originX: 'center',
                        originY: 'center'
                    });
                    canvas.add(text);
                    canvas.setActiveObject(text);
                    canvas.renderAll();
                } else if (tool === 'shape') {
                    const rect = new fabric.Rect({
                        left: 300,
                        top: 225,
                        width: 100,
                        height: 100,
                        fill: '#BCAE83',
                        originX: 'center',
                        originY: 'center'
                    });
                    canvas.add(rect);
                    canvas.setActiveObject(rect);
                    canvas.renderAll();
                } else if (tool === 'delete' && selectedObject) {
                    canvas.remove(selectedObject);
                    canvas.renderAll();
                }
            });
        });

        // Image upload
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    img.scaleToWidth(200);
                    img.set({
                        left: 300,
                        top: 225,
                        originX: 'center',
                        originY: 'center'
                    });
                    canvas.add(img);
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(file);
        });

        function zoom(delta) {
            currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
            canvas.setZoom(currentZoom);
            document.getElementById('zoomDisplay').textContent = Math.round(currentZoom * 100) + '%';
        }

        function preview() {
            const dataURL = canvas.toDataURL();
            const win = window.open();
            win.document.write('<img src="' + dataURL + '" style="max-width:100%">');
        }

        function saveAndContinue() {
            // This will integrate with your payment flow
            const dataURL = canvas.toDataURL();
            console.log('Saving design...', isBatchMode ? 'Batch' : 'Single');
            alert('Design saved! Ready for payment integration.');
        }

        // Initialize
        init();
    </script>
</body>
</html>
