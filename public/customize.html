    <style>
        /* ========== YOUR ORIGINAL CSS (unchanged) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary-gold: #BCAE83; 
            --primary-teal: #06D6A0; 
            --dark-bg: #1a1a2e; 
            --light-bg: #f5f5f5;
            --accent-purple: #764ba2;
            --danger: #FF6B6B;
            --warning: #FFD166;
        }
        .canvas-area, .canvas-container, #designCanvas, #canvasContainer, .lower-canvas, .upper-canvas { border: none !important; outline: none !important; box-shadow: none !important; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 15px; }
        .design-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-link { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; padding: 8px 15px; border-radius: 8px; background: rgba(255,255,255,0.1); font-size: 0.9rem; }
        .template-badge { background: var(--primary-gold); color: var(--dark-bg); padding: 4px 12px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; }
        .mode-switch { display: flex; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 3px; }
        .mode-option { padding: 6px 14px; border-radius: 15px; cursor: pointer; font-weight: 600; border: none; background: transparent; color: rgba(255,255,255,0.7); font-size: 0.85rem; }
        .mode-option.active { background: var(--primary-teal); color: #1a1a2e; }
        .price-display { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; font-weight: bold; border: 2px solid var(--primary-teal); font-size: 0.9rem; }
        .batch-controls { display: none; background: rgba(6, 214, 160, 0.1); border: 2px solid var(--primary-teal); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .batch-controls.active { display: block; }
        .design-layout { display: flex; gap: 12px; flex: 1; height: calc(100vh - 140px); }
        .tools-panel { width: 65px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; overflow-y: auto; }
        .tool-btn { width: 42px; height: 42px; border-radius: 10px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-size: 1.1rem; cursor: pointer; transition: all 0.2s; position: relative; }
        .tool-btn:hover, .tool-btn.active { background: var(--primary-gold); color: white; transform: translateY(-2px); }
        .tool-btn.danger:hover { background: var(--danger); }
        .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .tool-divider { width: 70%; height: 1px; background: rgba(255,255,255,0.1); margin: 3px 0; }
        .canvas-area { flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; }
        .canvas-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .canvas-controls { display: flex; gap: 10px; align-items: center; }
        .canvas-container { flex: 1; border-radius: 0 !important; overflow: auto; display: flex; justify-content: center; align-items: center; padding: 0 !important; background: transparent !important; border: none !important; position: relative; }
        #designCanvas { box-shadow: none !important; border-radius: 0 !important; border: none !important; }
        .properties-panel { width: 420px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; overflow-y: auto; color: white; display: flex; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .panel-title { color: var(--primary-gold); font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .property-section { margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .property-section h4 { margin-bottom: 10px; color: var(--primary-gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 6px; }
        .control-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .control-group { flex: 1; }
        .control-group label { display: block; font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; }
        .text-input { width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-family: inherit; font-size: 0.9rem; }
        .text-input:focus { outline: none; border-color: var(--primary-teal); }
        select, input[type="number"] { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 0.85rem; }
        select option { background: #2a2a3e; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider { flex: 1; height: 6px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 3px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--primary-teal); border-radius: 50%; cursor: pointer; }
        .slider-value { min-width: 45px; text-align: center; font-size: 0.85rem; font-weight: 600; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-icon { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-icon:hover, .btn-icon.active { background: var(--primary-gold); color: #1a1a2e; border-color: var(--primary-gold); }
        .btn-icon.small { padding: 6px 10px; font-size: 0.75rem; }
        .btn-icon.danger { border-color: var(--danger); }
        .btn-icon.danger:hover { background: var(--danger); color: white; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 10px; }
        input[type="color"] { width: 45px; height: 40px; border: none; border-radius: 6px; cursor: pointer; background: transparent; }

        .color-preset { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-preset:hover { transform: scale(1.1); border-color: white; }
        .layer-item { background: rgba(255,255,255,0.08); padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; transition: all 0.2s; border: 1px solid transparent; }
        .layer-item:hover { background: rgba(255,255,255,0.15); }
        .layer-item.active { border-color: var(--primary-gold); background: rgba(188, 174, 131, 0.15); }
        .layer-item.locked { opacity: 0.5; }
        .layer-actions { display: flex; gap: 5px; }
        .layer-btn { background: transparent; border: none; color: rgba(255,255,255,0.6); cursor: pointer; padding: 4px; border-radius: 4px; }
        .layer-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .effect-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        .effect-toggle:hover { background: rgba(255,255,255,0.1); }
        .toggle-switch { width: 40px; height: 22px; background: rgba(255,255,255,0.2); border-radius: 11px; position: relative; transition: all 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: all 0.3s; }
        .effect-toggle.active .toggle-switch { background: var(--primary-teal); }
        .effect-toggle.active .toggle-switch::after { left: 20px; }
        .bg-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bg-option { aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .bg-option:hover { transform: scale(1.05); }
        .bg-option.active { border-color: var(--primary-teal); }
        .checkout-section { background: linear-gradient(135deg, rgba(6, 214, 160, 0.15), rgba(102, 126, 234, 0.15)); border: 2px solid var(--primary-teal); border-radius: 12px; padding: 15px; margin-top: auto; }
        .checkout-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary-teal), var(--accent-purple)); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; }
        .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(6, 214, 160, 0.4); }
        .checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab { padding: 8px 16px; background: transparent; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 0.85rem; border-radius: 6px; transition: all 0.2s; }
        .tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .tab.active { color: var(--primary-teal); background: rgba(6, 214, 160, 0.1); font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; opacity: 0; transition: opacity 0.3s; }
        .grid-overlay.show { opacity: 1; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: var(--primary-gold); background: rgba(255,255,255,0.05); }
        .upload-area i { font-size: 1.8rem; margin-bottom: 8px; color: var(--primary-gold); }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: rgba(255,255,255,0.1); }
        #videoUploadSection .upload-area { border-color: var(--primary-teal); }
        #audioUploadSection .upload-area { border-color: var(--primary-gold); }

<body>
    <div class="app-container">
        <div class="design-header">
            <div class="header-left">
                <a href="templates.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
                <h1 style="font-size: 1.3rem;"><i class="fas fa-magic"></i> Studio</h1>
                <span class="template-badge" id="templateName">Design</span>
            </div>

    <script>

        // ========== WORKING BATCH / SINGLE FUNCTIONS (inserted from old code) ==========
        function updatePrice() {
            const qty = parseInt(document.getElementById('qtyInput').value) || 2;
            const total = (qty * 2.99).toFixed(2);
            document.getElementById('totalPrice').textContent = '$' + total;
            document.getElementById('priceDisplay').textContent = '$' + total;
        }

        function updateCheckoutDisplay() {
            const qty = isBatchMode ? (parseInt(document.getElementById('qtyInput').value) || 2) : 1;
            const total = (qty * 2.99).toFixed(2);
            document.getElementById('checkoutTotal').textContent = '$' + total;
        }

        function enableBatchMode() {
            isBatchMode = true;
            document.getElementById('batchControls').classList.add('active');
            document.getElementById('singleModeBtn').classList.remove('active');
            document.getElementById('batchModeBtn').classList.add('active');
            updatePrice();
            updateCheckoutDisplay();
        }

        function updateQty(change) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + change;
            if (val < 2) val = 2;
            if (val > 2000) val = 2000;
            input.value = val;
            document.getElementById('qtyDisplay').textContent = val;
            updatePrice();
            updateCheckoutDisplay();
        }

        function setupQtyControls() {
            document.getElementById('qtyMinus').addEventListener('click', () => updateQty(-1));
            document.getElementById('qtyPlus').addEventListener('click', () => updateQty(1));
            document.getElementById('qtyInput').addEventListener('change', function() {
                document.getElementById('qtyDisplay').textContent = this.value;
                updatePrice();
                updateCheckoutDisplay();
            });
        }

        function setupModeSwitch() {
            document.getElementById('singleModeBtn').addEventListener('click', function() {
                isBatchMode = false;
                this.classList.add('active');
                document.getElementById('batchModeBtn').classList.remove('active');
                document.getElementById('batchControls').classList.remove('active');
                document.getElementById('priceDisplay').textContent = '$2.99';
                updateCheckoutDisplay();
            });
            document.getElementById('batchModeBtn').addEventListener('click', enableBatchMode);
        }
        // ========================================================================

        // Then the rest of your init() calls setupQtyControls() and setupModeSwitch()
        // All other code (canvas, layers, undo, video, audio, etc.) remains exactly as you had it.
    </script>
